// ── RAPORT DITOR TELEGRAM ─────────────────────────
async function dergoPDFRaportDitor(sotStr, punetor, fillimiArkes, totalShitje, gjithsej, rezultati, dallimi, koment, totalShpenzime) {
  totalShpenzime = totalShpenzime || 0;
  try {
    const shitjetSot = shitjet.filter(function(s) { return s.data === sotStr && s.punetori === punetor; });
    const oraHapur = arkaSOT && arkaSOT.krijuar && arkaSOT.krijuar.seconds
      ? new Date(arkaSOT.krijuar.seconds * 1000).toLocaleTimeString('sq', {hour:'2-digit', minute:'2-digit'})
      : '--:--';
    const oraMbyllur = new Date().toLocaleTimeString('sq', {hour:'2-digit', minute:'2-digit'});

    // Lista produkteve
    const byProd = {};
    shitjetSot.forEach(function(s) {
      const pk = (s.produkti||'').toLowerCase().trim();
      if (!byProd[pk]) byProd[pk] = {sasi:0, total:0, emri:s.produkti||''};
      byProd[pk].sasi += (s.sasia||0);
      byProd[pk].total += (s.total||0);
    });
    const prodSorted = Object.values(byProd).sort(function(a,b) { return b.total-a.total; });
    let prodLines = '';
    prodSorted.forEach(function(d) {
      prodLines += '  ' + d.emri + ' x' + d.sasi + ' = ' + fm(d.total) + '\n';
    });
    if (!prodLines) prodLines = '  (Nuk ka shitje)\n';

    // Produkti yll i dites
    const yll = prodSorted.length ? prodSorted[0].emri + ' (' + prodSorted[0].sasi + ' cope, ' + fm(prodSorted[0].total) + ')' : null;

    // Shitja me e madhe
    const maxShitje = shitjetSot.reduce(function(max, s) { return (s.total||0) > (max.total||0) ? s : max; }, {total:0});

    // Historiku i punetorit
    const shitjetPunetor = shitjet.filter(function(s) { return s.punetori === punetor && s.data && s.data !== sotStr; });
    const totalPerDite = {};
    shitjetPunetor.forEach(function(s) {
      if (!totalPerDite[s.data]) totalPerDite[s.data] = 0;
      totalPerDite[s.data] += (s.total||0);
    });

    // Mesatare muaji
    const muaj = sotStr.substring(0,7);
    const shitjetMuaj = shitjet.filter(function(s) { return (s.data||'').startsWith(muaj) && s.data !== sotStr; });
    const ditetMuaj = [...new Set(shitjetMuaj.map(function(s) { return s.data; }))];
    const mesatareMuaj = ditetMuaj.length > 0
      ? shitjetMuaj.reduce(function(a,s) { return a+(s.total||0); }, 0) / ditetMuaj.length : 0;

    // Rekord personal
    const rekordi = Object.values(totalPerDite).length ? Math.max.apply(null, Object.values(totalPerDite)) : 0;

    // Streak - dite rresht mbi mesatare
    let streak = 0;
    if (mesatareMuaj > 0) {
      const ditetSort = Object.entries(totalPerDite).sort(function(a,b) { return b[0].localeCompare(a[0]); });
      for (var i = 0; i < ditetSort.length; i++) {
        if (ditetSort[i][1] >= mesatareMuaj) streak++;
        else break;
      }
    }

    // Dita e javes historike
    const sotDate = new Date(sotStr + 'T12:00:00');
    const ditetJavesEmri = ['E Diel','E Hene','E Marte','E Merkure','E Enjte','E Premte','E Shtune'];
    const ditaJaves = ditetJavesEmri[sotDate.getDay()];
    const ditetNjejta = Object.entries(totalPerDite).filter(function(e) {
      return new Date(e[0]+'T12:00:00').getDay() === sotDate.getDay();
    });
    const mesatareDitaJaves = ditetNjejta.length > 0
      ? ditetNjejta.reduce(function(a,e) { return a+e[1]; }, 0) / ditetNjejta.length : 0;

    // E njejta dite java e kaluar
    const javEKaluar = new Date(sotDate); javEKaluar.setDate(sotDate.getDate()-7);
    const javEKaluarStr = javEKaluar.toISOString().split('T')[0];
    const totalJavaKaluar = totalPerDite[javEKaluarStr] || 0;

    // Ditet e mbetura te muajit
    const ditetKaluara = ditetMuaj.length + 1;
    const totalMuajDeriTani = shitjetMuaj.reduce(function(a,s) { return a+(s.total||0); }, 0) + totalShitje;
    const ditetMbetura = Math.max(0, 26 - ditetKaluara);
    const nevojitetPerDite = ditetMbetura > 0 && mesatareMuaj > 0
      ? Math.max(0, (mesatareMuaj * 26 - totalMuajDeriTani) / ditetMbetura) : 0;

    // Efikasiteti
    let efikasiteti = '';
    if (arkaSOT && arkaSOT.krijuar && arkaSOT.krijuar.seconds && shitjetSot.length > 0) {
      const oretPune = (Date.now() - arkaSOT.krijuar.seconds * 1000) / 3600000;
      if (oretPune > 0.5) efikasiteti = (shitjetSot.length / oretPune).toFixed(1) + ' shitje/ore';
    }

    // Nderto komentet
    const komentet = [];

    // 1. Vleresim kryesor i dites
    if (shitjetSot.length === 0) {
      komentet.push('Sot nuk u be asnje shitje.');
    } else if (mesatareMuaj > 0) {
      const diff = ((totalShitje - mesatareMuaj) / mesatareMuaj * 100);
      if (totalShitje >= mesatareMuaj * 1.3) {
        komentet.push('Dite shkelqyese! +' + diff.toFixed(0) + '% mbi mesataren e muajit (' + fm(mesatareMuaj) + '/dite). Keshtu duhet!');
      } else if (totalShitje >= mesatareMuaj * 1.05) {
        komentet.push('Dite e mire! +' + diff.toFixed(0) + '% mbi mesataren e muajit (' + fm(mesatareMuaj) + '/dite).');
      } else if (totalShitje >= mesatareMuaj * 0.8) {
        komentet.push('Dite normale, afer mesatares se muajit (' + fm(mesatareMuaj) + '/dite).');
      } else {
        komentet.push('Dite me pak shitje se zakonisht, ' + Math.abs(diff).toFixed(0) + '% nen mesataren (' + fm(mesatareMuaj) + '/dite).');
      }
    }

    // 2. Rekord personal
    if (totalShitje > rekordi && rekordi > 0) {
      komentet.push('REKORD PERSONAL! Dita juaj me e mire ndonjehere!');
    } else if (rekordi > 0 && totalShitje >= rekordi * 0.9) {
      komentet.push('Shume afer rekordit personal (' + fm(rekordi) + '). Vetem ' + fm(rekordi - totalShitje) + ' larg!');
    }

    // 3. Streak
    if (streak >= 3) {
      komentet.push(streak + ' dite rresht mbi mesatare - vazhdoni keshtu!');
    }

    // 4. Kontekst dite javes
    if (mesatareDitaJaves > 0 && shitjetSot.length > 0) {
      const diffJave = ((totalShitje - mesatareDitaJaves) / mesatareDitaJaves * 100);
      if (totalShitje >= mesatareDitaJaves * 1.15) {
        komentet.push(ditaJaves + ' historikisht mesatarisht ' + fm(mesatareDitaJaves) + ' - sot e kalonit!');
      } else if (totalShitje < mesatareDitaJaves * 0.85) {
        komentet.push(ditaJaves + ' zakonisht ' + fm(mesatareDitaJaves) + ' - sot pak me dobet se zakoni.');
      }
    }

    // 5. Krahasim java e kaluar
    if (totalJavaKaluar > 0 && shitjetSot.length > 0) {
      const diffJk = ((totalShitje - totalJavaKaluar) / totalJavaKaluar * 100);
      if (Math.abs(diffJk) >= 15) {
        const shenjJk = diffJk >= 0 ? '+' : '';
        komentet.push(ditaJaves + ' e kaluar: ' + fm(totalJavaKaluar) + ' (' + shenjJk + diffJk.toFixed(0) + '% ndryshim).');
      }
    }

    // 6. Produkti yll
    if (yll && shitjetSot.length > 0) {
      komentet.push('Ylli i dites: ' + yll + '.');
    }

    // 7. Shitja me e madhe
    if (maxShitje.total > 0 && maxShitje.produkti) {
      komentet.push('Shitja me e madhe: ' + maxShitje.produkti + ' ' + fm(maxShitje.total) + '.');
    }

    // 8. Efikasiteti
    if (efikasiteti) {
      komentet.push('Ritmi i dites: ' + efikasiteti + '.');
    }

    // 9. Motivim per ditet e mbetura
    if (ditetMbetura > 0 && nevojitetPerDite > 0 && shitjetSot.length > 0) {
      komentet.push('Muaji: ' + fm(totalMuajDeriTani) + ' deri tani. Nevojiten ~' + fm(nevojitetPerDite) + '/dite per ' + ditetMbetura + ' ditet e mbetura.');
    }

    // 10. Motivim kur mungon pak per mesatare
    if (mesatareMuaj > 0 && totalShitje < mesatareMuaj && (mesatareMuaj - totalShitje) <= mesatareMuaj * 0.15) {
      komentet.push('Edhe ' + fm(mesatareMuaj - totalShitje) + ' dhe e kalonit mesataren e muajit!');
    }

    const statusLine = rezultati === 'ok' ? 'BARAZUAR' : 'DALLIM ' + fm(dallimi) + ' | ' + koment;

    const msg = 'RAPORT DITOR - DOHA Accessories\n'
      + 'Punetori: ' + punetor + '\n'
      + 'Data: ' + sotStr + '  |  ' + oraHapur + ' - ' + oraMbyllur + '\n'
      + '----------------------------\n'
      + prodLines
      + '----------------------------\n'
      + 'Fillim arkes: ' + fm(fillimiArkes) + '\n'
      + 'Total shitje: ' + fm(totalShitje) + '\n'
      + (totalShpenzime > 0 ? 'Shpenzime: -' + fm(totalShpenzime) + '\n' : '')
      + 'Gjithsej ne arke: ' + fm(gjithsej) + '\n'
      + 'Arka: ' + statusLine + '\n'
      + '----------------------------\n'
      + komentet.join('\n');

    await tg(msg);
  } catch(e) { console.warn('raport ditor:', e.message); }
}

window.shkarkoExcel = function(dataFillim, dataMbarim) {
  const lista = shitjet.filter(function(s) {
    return s.data >= dataFillim && s.data <= dataMbarim;
  });
  if (!lista.length) return err('Nuk ka shitje per kete periudhe!');

  const byPunetor = {};
  lista.forEach(function(s) {
    if (!byPunetor[s.punetori]) byPunetor[s.punetori] = 0;
    byPunetor[s.punetori] += (s.total||0);
  });
  const byDate = {};
  lista.forEach(function(s) {
    if (!byDate[s.data]) byDate[s.data] = 0;
    byDate[s.data] += (s.total||0);
  });

  const BOM = '\uFEFF';
  let csv = BOM + 'Data,Produkti,Sasia,Njesia,Cmimi EUR,Total EUR,Punetori,Klienti,Shenimi\n';
  lista.sort(function(a,b) { return a.data.localeCompare(b.data); }).forEach(function(s) {
    const row = [
      s.data, '"' + (s.produkti||'').replace(/"/g,'""') + '"',
      (s.sasia||0), (s.njesia||'cop'),
      (s.cmimi||0).toFixed(2), (s.total||0).toFixed(2),
      (s.punetori||''), '"' + (s.klienti||'').replace(/"/g,'""') + '"',
      '"' + (s.shen||'').replace(/"/g,'""') + '"'
    ];
    csv += row.join(',') + '\n';
  });

  // Summary sheet at bottom
  csv += '\n\nPERMBLEDHJA\n';
  csv += 'Punetori,Total EUR\n';
  Object.entries(byPunetor).sort(function(a,b) { return b[1]-a[1]; }).forEach(function(e) {
    csv += e[0] + ',' + e[1].toFixed(2) + '\n';
  });
  csv += '\nData,Total EUR\n';
  Object.entries(byDate).sort(function(a,b) { return a[0].localeCompare(b[0]); }).forEach(function(e) {
    csv += e[0] + ',' + e[1].toFixed(2) + '\n';
  });
  csv += '\nGJITHSEJ,' + lista.reduce(function(a,s) { return a+(s.total||0); }, 0).toFixed(2) + '\n';

  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'DOHA_' + dataFillim + '_' + dataMbarim + '.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  ok('Excel u shkarkua!');
};

let stockFilter = { kerkim: '', kategoria: '', pamje: 'list' };

function renderStock() {
  if (!isAdminView()) return;
  const totalProduktet = stock.length;
  const totalVlera = stock.reduce(function(a,p) { return a + (p.cmimiBlerjes||0) * (p.sasia||0); }, 0);
  const totalShitje = stock.reduce(function(a,p) { return a + (p.cmimiShitjes||0) * (p.sasia||0); }, 0);
  const fitimPotencial = totalShitje - totalVlera;
  const stokuUlet = stock.filter(function(p) { return p.lloji !== 'set' && (p.sasia||0) <= (p.sasiaMin||3); });
  const paCmimBlerjes = stock.filter(function(p) { return p.lloji !== 'set' && (p.cmimiBlerjes === null || p.cmimiBlerjes === undefined || p.cmimiBlerjes === ''); });

  // Filter stock
  const filtered = stock.filter(function(p) {
    const matchKerkim = !stockFilter.kerkim || (p.emri||'').toLowerCase().includes(stockFilter.kerkim.toLowerCase());
    const matchKat = !stockFilter.kategoria || p.kategoriaId === stockFilter.kategoria;
    return matchKerkim && matchKat;
  });

  // Kategori tabs — shfaq pemën
  const tree = buildKatTree();
  let katTabs = '<button class="rtab ' + (!stockFilter.kategoria ? 'active' : '') + '" onclick="filtroProd(\'\')">Te gjitha</button>';
  function addKatTab(nodes, level) {
    nodes.forEach(function(k) {
      const prefix = level > 0 ? '&nbsp;'.repeat(level*2) + '▸ ' : '';
      katTabs += '<button class="rtab ' + (stockFilter.kategoria === k.id ? 'active' : '') + '" data-kid="' + k.id + '" onclick="filtroProd(this.dataset.kid)" ondragover="event.preventDefault();this.style.outline=\'2px solid var(--accent)\'" ondragleave="this.style.outline=\'\'" ondrop="dropNeProd(event,this.dataset.kid);this.style.outline=\'\'" style="font-size:' + (level===0?'13':'12') + 'px">' + prefix + k.emri + '</button>';
      addKatTab(tree.getChildren(k.id), level + 1);
    });
  }
  addKatTab(tree.roots, 0);

  // Analitika — produktet qe nuk levizin
  const sot = new Date().toISOString().split('T')[0];
  const para30 = new Date(); para30.setDate(para30.getDate()-30);
  const para30Str = para30.toISOString().split('T')[0];
  const shitjetSipasStok = {};
  shitjet.forEach(function(s) {
    if (!s.stockId || !s.data) return;
    if (s.data >= para30Str) {
      shitjetSipasStok[s.stockId] = (shitjetSipasStok[s.stockId]||0) + (s.sasia||1);
    }
  });
  // Rotacion — dite mesatare para shitjes
  const rotacionData = {};
  shitjet.forEach(function(s) {
    if (!s.stockId || !s.krijuar || !s.krijuar.seconds) return;
    const p = stock.find(function(x) { return x.id === s.stockId; });
    if (!p || !p.krijuar || !p.krijuar.seconds) return;
    const ditePritje = Math.round((s.krijuar.seconds - p.krijuar.seconds) / 86400);
    if (ditePritje >= 0 && ditePritje < 365) {
      if (!rotacionData[s.stockId]) rotacionData[s.stockId] = [];
      rotacionData[s.stockId].push(ditePritje);

        + '<div style="position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:' + (eshteSet ? 'var(--accent2)' : statusColor) + ';box-shadow:0 0 6px ' + (eshteSet ? 'var(--accent2)' : statusColor) + '"></div>'

window.shfaqAnalitiken = function() {
  const para30 = new Date(); para30.setDate(para30.getDate()-30);
  const para30Str = para30.toISOString().split('T')[0];
  const sot = new Date().toISOString().split('T')[0];

  // Shitjet per produkt (me stockId)
  const shitPerStok = {};
  shitjet.forEach(function(s) {
    if (!s.stockId) return;
    if (!shitPerStok[s.stockId]) shitPerStok[s.stockId] = { total30: 0, totalGjith: 0, count: 0, lastSale: '' };
    shitPerStok[s.stockId].totalGjith += (s.total||0);
    shitPerStok[s.stockId].count++;
    if (s.data >= para30Str) shitPerStok[s.stockId].total30 += (s.total||0);
    if (!shitPerStok[s.stockId].lastSale || s.data > shitPerStok[s.stockId].lastSale) shitPerStok[s.stockId].lastSale = s.data;
  });

  // Produktet qe nuk levizin 30+ dite
  const nukLevizin = stock.filter(function(p) {
    if (p.lloji === 'set') return false;
    const sh = shitPerStok[p.id];
    if (!sh) return true; // asnjehere nuk eshte shitur me stock
    const ditePaDalur = Math.round((new Date(sot) - new Date(sh.lastSale)) / 86400000);
    return ditePaDalur > 30;
  });

  // Rotacion mesatar per produkt
  let rotRows = '';
  stock.filter(function(p) { return p.lloji !== 'set' && shitPerStok[p.id]; })
    .sort(function(a,b) { return (shitPerStok[b.id].total30||0) - (shitPerStok[a.id].total30||0); })
    .slice(0,10)
    .forEach(function(p) {
      const sh = shitPerStok[p.id];
      const ditePaDalur = sh.lastSale ? Math.round((new Date(sot) - new Date(sh.lastSale)) / 86400000) : null;
      const fitimReal = !isNaN(p.cmimiBlerjes) && p.cmimiBlerjes !== null ? fm(sh.totalGjith - p.cmimiBlerjes * sh.count) : '-';
      rotRows += '<div class="top-row" style="padding:8px 0">'
        + '<div class="top-info"><strong>' + p.emri + '</strong>'
        + '<span>' + sh.count + ' shitje &bull; ' + (ditePaDalur !== null ? ditePaDalur + ' dite pa dale' : '') + ' &bull; Fitim real: ' + fitimReal + '</span></div>'
        + '<div class="top-total">' + fm(sh.total30) + '</div></div>';
    });

  let nukLevizinRows = nukLevizin.length
    ? nukLevizin.map(function(p) {
        const sh = shitPerStok[p.id];
        const lastSale = sh && sh.lastSale ? sh.lastSale : 'Asnjehere';
        return '<div class="top-row" style="padding:8px 0">'
          + '<div class="top-info"><strong>' + p.emri + '</strong>'
          + '<span>Shitja e fundit: ' + lastSale + ' &bull; ' + (p.sasia||0) + ' cope ne stock</span></div>'
          + '<div style="font-size:12px;color:var(--error);font-weight:600">30+ dite</div></div>';
      }).join('')
    : '<div class="empty-state">Te gjitha produktet kane levizur!</div>';

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.innerHTML = '<div class="modal-box" style="max-height:85vh;overflow-y:auto">'
    + '<h3 style="margin-bottom:16px">&#128202; Analitike Stoku</h3>'
    + '<div style="font-size:13px;font-weight:600;color:var(--error);margin-bottom:8px">&#9888; Produktet pa levizje 30+ dite</div>'
    + nukLevizinRows
    + '<div style="font-size:13px;font-weight:600;color:var(--accent);margin:16px 0 8px">&#128200; Top 10 produktet (30 ditet e fundit)</div>'
    + (rotRows || '<div class="empty-state">Nuk ka te dhena (nevojitet stockId ne shitje)</div>')
    + '<button onclick="this.closest(\'.modal-overlay\').remove()" style="width:100%;margin-top:16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);cursor:pointer;font-family:DM Sans,sans-serif">Mbylle</button>'
    + '</div>';
  document.body.appendChild(ov);
};

};

let _qrStream = null;
let _qrInterval = null;

function startQRScanner() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(function(stream) {
      _qrStream = stream;
      const video = document.getElementById('qr-video');
      if (!video) { stopQRScanner(); return; }
      video.srcObject = stream;
      video.play();
      // Scan every 500ms
      _qrInterval = setInterval(function() { scanQRFrame(); }, 500);
    })
    .catch(function(e) {
      const status = document.getElementById('qr-status');
      if (status) status.innerHTML = '<span style="color:var(--error)">Kamera nuk u hap: ' + e.message + '</span>';
    });
}

function stopQRScanner() {
  if (_qrInterval) { clearInterval(_qrInterval); _qrInterval = null; }
  if (_qrStream) { _qrStream.getTracks().forEach(function(t) { t.stop(); }); _qrStream = null; }
}

function scanQRFrame() {
  const video = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-canvas');
  if (!video || !canvas || video.readyState < 2) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  try {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    // Use BarcodeDetector API if available
    if (window.BarcodeDetector) {
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      detector.detect(canvas).then(function(codes) {
        if (codes.length > 0) {
          qrDetektuar(codes[0].rawValue);
        }
      }).catch(function() {});
    }
  } catch(e) {}
}

function qrDetektuar(qrValue) {
  stopQRScanner();
  document.getElementById('modal-qr-scan')?.remove();
  // Format: doha-stock:STOCK_ID
  if (qrValue.startsWith('doha-stock:')) {
    const stockId = qrValue.replace('doha-stock:', '');
    const p = stock.find(function(s) { return s.id === stockId; });
    if (p) {
      zgjidhStokun(stockId);
      ok('U skanua: ' + p.emri);
    } else {
      err('Produkti nuk u gjet ne stock!');
    }
  } else {
    err('QR kod i panjohur: ' + qrValue);
  }
}

// ── HELPER: nderto pemen e kategorive ─────────────
function buildKatTree() {
  // Level 1: pa prind
  const roots = kategorite.filter(function(k) { return !k.parentId; });
  function getChildren(parentId) {
    return kategorite.filter(function(k) { return k.parentId === parentId; });
  }
  return { roots: roots, getChildren: getChildren };
}

function buildKatSelector(selectedId, excludeId, indent) {
  indent = indent || 0;
  const tree = buildKatTree();
  let opts = '<option value="">— Pa kategori —</option>';
  function addLevel(nodes, level) {
    nodes.forEach(function(k) {
      if (k.id === excludeId) return;
      const prefix = '&nbsp;'.repeat(level * 4);
      opts += '<option value="' + k.id + '"' + (selectedId === k.id ? ' selected' : '') + '>' + prefix + k.emri + '</option>';
      addLevel(tree.getChildren(k.id), level + 1);
    });
  }
  addLevel(tree.roots, 0);
  return opts;
}

function buildKatTreeHTML(nodes, tree, level) {
  level = level || 0;
  if (!nodes.length) return '';
  let h = '';
  nodes.forEach(function(k) {
    const nrProd = stock.filter(function(p) { return p.kategoriaId === k.id; }).length;
    const children = tree.getChildren(k.id);
    const canAddChild = level < 2; // max 3 nivele (0,1,2)
    h += '<div style="margin-left:' + (level*20) + 'px;border-left:' + (level>0?'2px solid var(--border)':'none') + ';padding-left:' + (level>0?'10px':'0') + ';margin-bottom:4px">'
      + '<div style="display:flex;align-items:center;gap:8px;padding:8px 0">'
      + '<span style="font-size:12px;color:var(--text2)">' + (level===0?'▸':level===1?'▹':'◦') + '</span>'
      + '<span style="flex:1;font-weight:' + (level===0?'600':'400') + ';font-size:' + (level===0?'14':'13') + 'px">' + k.emri + '</span>'
      + '<span style="font-size:11px;color:var(--text2)">' + nrProd + ' prod</span>'
      + (canAddChild ? '<button data-kid="' + k.id + '" data-level="' + (level+1) + '" onclick="shtoNenkategorine(this.dataset.kid, parseInt(this.dataset.level))" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:11px;padding:2px 7px">+Sub</button>' : '')
      + '<button data-kid="' + k.id + '" onclick="fshijKategorine(this.dataset.kid)" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:16px">&times;</button>'
      + '</div>'
      + buildKatTreeHTML(children, tree, level + 1)
      + '</div>';
  });
  return h;
}

window.shfaqFotoStock = function(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h*MAX/w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w*MAX/h); h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      window._stockFotoB64 = canvas.toDataURL('image/jpeg', 0.75);
      const prev = document.getElementById('st-foto-preview');
      if (prev) prev.innerHTML = '<img src="' + window._stockFotoB64 + '" style="width:100%;height:100%;object-fit:cover">';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
};

window.fshiFotoStock = function() {
  window._stockFotoB64 = null;
  const prev = document.getElementById('st-foto-preview');
  if (prev) prev.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px">&#128247;</div>';
};

window.ruajSetin = async function(id) {
  const emri = document.getElementById('set-emri')?.value?.trim();
  const cmimiSet = parseFloat(document.getElementById('set-cmimi-set')?.value);
  const blerje = parseFloat(document.getElementById('set-blerje')?.value) || 0;
  if (!emri) return err('Shkruaj emrin e setit!');
  if (isNaN(cmimiSet) || cmimiSet <= 0) return err('Shkruaj cmimin e setit!');
  if (!window._setProdukte.length) return err('Shto te pakten nje produkt ne set!');
  document.getElementById('modal-set')?.remove();
  try {
    const data = {
      emri: emri,
      lloji: 'set',
      produktet: window._setProdukte,
      cmimiShitjes: cmimiSet,
      cmimiBlerjes: blerje,
      cmimiTotal: window._setProdukte.reduce(function(a,pr) { return a+pr.cmimi; }, 0),
      sasia: 999,
      sasiaMin: 0,
      pershkrimi: window._setProdukte.map(function(p) { return p.emri; }).join(', '),
      ndryshuar: serverTimestamp()
    };
    if (window._setFotoB64 !== undefined) data.fotoUrl = window._setFotoB64 || '';
    if (id) {
      await updateDoc(doc(db, 'stock', id), data);
      ok('Seti u ndryshua!');
    } else {
      data.krijuar = serverTimestamp();
      await addDoc(collection(db, 'stock'), data);
      ok('Seti u shtua ne stock!');
    }
    window._setProdukte = [];
    window._setFotoB64 = undefined;
  } catch(e) { err(e.message); }
};

window.llogaritMarzhStok = function() {
  const b = parseFloat(document.getElementById('st-blerje')?.value) || 0;
  const s = parseFloat(document.getElementById('st-shitje')?.value) || 0;
  const box = document.getElementById('st-marzhi-show');
  const val = document.getElementById('st-marzhi-val');
  if (!box || !val) return;
  if (b > 0 && s > 0) {
    box.style.display = 'flex';
    const marzhi = ((s - b) / s * 100).toFixed(1);
    const fitim = fm(s - b);
    const color = marzhi >= 40 ? 'var(--success)' : marzhi >= 20 ? 'var(--accent)' : 'var(--error)';
    val.innerHTML = '<span style="color:' + color + '">' + marzhi + '% (' + fitim + '/cope)</span>';
  } else {
    box.style.display = 'none';
  }
};

window.ruajStockun = async function(id) {
  const emri = document.getElementById('st-emri')?.value?.trim();
  const pershk = document.getElementById('st-pershk')?.value?.trim();
  const kategoriaId = document.getElementById('st-kat')?.value || '';
  const blerje = parseFloat(document.getElementById('st-blerje')?.value);
  const shitje = parseFloat(document.getElementById('st-shitje')?.value);
  const sasia = parseInt(document.getElementById('st-sasia')?.value);
  const sasiaMin = parseInt(document.getElementById('st-min')?.value) || 3;
  if (!emri) return err('Shkruaj emrin!');
  // cmimi blerjes eshte opsional
  if (isNaN(shitje)||shitje<=0) return err('Shkruaj cmimin e shitjes!');
  if (isNaN(sasia)||sasia<0) return err('Shkruaj sasine!');
  document.getElementById('modal-stock')?.remove();
  try {
    const data = {
      emri: emri,
      pershkrimi: pershk || '',
      kategoriaId: kategoriaId,
      cmimiBlerjes: isNaN(blerje) ? null : blerje,
      cmimiShitjes: shitje,
      sasia: sasia,
      sasiaMin: sasiaMin,
      ndryshuar: serverTimestamp()
    };
    if (window._stockFotoB64 !== undefined) {
      data.fotoUrl = window._stockFotoB64 || '';
    }
    if (id) {
      await updateDoc(doc(db, 'stock', id), data);
      ok('Produkti u ndryshua!');
    } else {
      data.krijuar = serverTimestamp();
      await addDoc(collection(db, 'stock'), data);
      ok('Produkti u shtua ne stock!');
    }
    window._stockFotoB64 = undefined;
  } catch(e) { err(e.message); }
};

window.fshijStockun = async function(id) {
  const p = stock.find(function(s) { return s.id === id; });
  if (!p) return;
  if (!confirm('Fshij "' + p.emri + '" nga stock?')) return;
  try {
    await deleteDoc(doc(db, 'stock', id));
    ok('Produkti u fshi nga stock!');
  } catch(e) { err(e.message); }
};

// ── FITIMI NE RAPORTE ─────────────────────────────
function llogaritFitimin(shitjetLista) {
  // Match shitjet me stock per te llogaritur fitimin
  const stockMap = {};
  stock.forEach(function(p) {
    const key = (p.emri||'').toLowerCase().trim();
    stockMap[key] = p.cmimiBlerjes || 0;
  });

  let totalFitim = 0;
  let totalShitje = 0;
  let totalKosto = 0;
  let saBejneFitim = 0;

  shitjetLista.forEach(function(s) {
    const total = s.total || 0;
    totalShitje += total;
    const key = (s.produkti||'').toLowerCase().trim();
    const blerje = stockMap[key] || 0;
    if (blerje > 0) {
      const kosto = blerje * (s.sasia||1);
      totalKosto += kosto;
      totalFitim += total - kosto;
      saBejneFitim++;
    }
  });

  return {
    totalShitje: totalShitje,
    totalKosto: totalKosto,
    totalFitim: totalFitim,
    marzhi: totalShitje > 0 ? (totalFitim / totalShitje * 100).toFixed(1) : 0,
    coverage: shitjetLista.length > 0 ? (saBejneFitim / shitjetLista.length * 100).toFixed(0) : 0
  };
}

window.zgjidhProdPostStock = function() {
  const sel = document.getElementById('pp-stock-sel');
  if (!sel || !sel.value) return;
  const opt = sel.options[sel.selectedIndex];
  const emriEl = document.getElementById('pp-emri');
  const cmimiEl = document.getElementById('pp-cmimi');
  if (emriEl) emriEl.value = opt.value;
  if (cmimiEl) cmimiEl.value = opt.getAttribute('data-cmimi') || '';
};

window.konfirmoShtoProdukt = async function(postaId) {
  const emri = document.getElementById('pp-emri')?.value?.trim();
  const cmimi = parseFloat(document.getElementById('pp-cmimi')?.value);
  const sasia = parseInt(document.getElementById('pp-sasia')?.value) || 1;
  if (!emri) return err('Shkruaj emrin!');
  if (isNaN(cmimi) || cmimi < 0) return err('Shkruaj cmimin!');
  document.getElementById('modal-pp')?.remove();
  try {
    const posta = postat.find(function(p) { return p.id === postaId; });
    const produktet = (posta?.produktet||[]).concat([{emri: emri, cmimi: cmimi, sasia: sasia}]);
    await updateDoc(doc(db, 'postat', postaId), {produktet: produktet});
  } catch(e) { err(e.message); }
};

window.fshiProduktPoste = async function(postaId, idx) {
  try {
    const posta = postat.find(function(p) { return p.id === postaId; });
    const produktet = (posta?.produktet||[]).filter(function(_,i) { return i !== idx; });
    await updateDoc(doc(db, 'postat', postaId), {produktet: produktet});
  } catch(e) { err(e.message); }
};

window.procesoPosta = async function(postaId) {
  const posta = postat.find(function(p) { return p.id === postaId; });
  if (!posta || !posta.produktet || !posta.produktet.length) return err('Shto te pakten nje produkt!');
  const sotStr = new Date().toISOString().split('T')[0];
  const dataShitjes = posta.data || sotStr;
  const ora = new Date().toLocaleTimeString('sq', {hour:'2-digit', minute:'2-digit'});
  try {
    await Promise.all(posta.produktet.map(function(pr) {
      return addDoc(collection(db, 'shitjet'), {
        produkti: pr.emri,
        sasia: pr.sasia || 1,
        cmimi: pr.cmimi,
        njesia: 'cop',
        total: pr.cmimi * (pr.sasia||1),
        data: dataShitjes,
        punetori: 'posta',
        punetoriUid: 'admin_posta',
        klienti: '',
        shen: 'Shitje online - posta ' + dataShitjes,
        krijuar: serverTimestamp(),
        ndryshuar: serverTimestamp(),
        ngaPosta: true,
      });
    }));
    const total = posta.produktet.reduce(function(a,pr) { return a+(pr.cmimi||0)*(pr.sasia||1); }, 0);
    await updateDoc(doc(db, 'postat', postaId), {
      procesuar: true, procesuarNe: serverTimestamp(), totalPosta: total
    });

    // Njoftim Telegram
    let prodLines = posta.produktet.map(function(pr) {
      return '  ' + pr.emri + ' x' + (pr.sasia||1) + ' = ' + fm((pr.cmimi||0)*(pr.sasia||1));
    }).join('\n');
    await tg('POSTA U PROCESUA - DOHA Accessories\n\nData: ' + dataShitjes + '\nOra: ' + ora + '\nPunetori: ' + (posta.punetori||'-') + '\n\nProduktet:\n' + prodLines + '\n\nTotal: ' + fm(total));

    ok('Posta u procesua! ' + posta.produktet.length + ' produkte => shitje (' + fm(total) + ')');
  } catch(e) { err(e.message); }
};

async function ngarkoShpenzimetFikse(muajStr) {
  try {
    const snap = await getDocs(query(collection(db, 'shpenzime_fikse'), orderBy('krijuar','desc')));
    const te_gjitha = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    const muajit = te_gjitha.filter(function(s) { return (s.muaji||'').startsWith(muajStr); });
    // Gjitha muajt unik per selector
    const muajt = Array.from(new Set(te_gjitha.map(function(s) { return s.muaji||''; }).filter(Boolean))).sort().reverse();

    const el = document.getElementById('fikse-lista');
    if (!el) return;

    const totalMuaj = muajit.reduce(function(a,s) { return a+(s.shuma||0); }, 0);

    // Muaj selector
    let muajOpts = '<option value="' + muajStr + '">' + muajStr + ' (ky muaj)</option>';
    muajt.forEach(function(m) {
      if (m !== muajStr) muajOpts += '<option value="' + m + '">' + m + '</option>';
    });

    let rows = muajit.length ? muajit.map(function(s) {
      return '<div class="top-row">'
        + '<div class="top-info"><strong>' + (s.kategoria||'Shpenzim') + '</strong>'
        + '<span>' + (s.pershkrimi||'') + ' &bull; ' + (s.muaji||'') + '</span></div>'
        + '<div style="text-align:right"><div style="font-weight:700;color:var(--error)">-' + fm(s.shuma||0) + '</div>'
        + '<button data-sid="' + s.id + '" onclick="fshiShpenzimFiks(this.dataset.sid)" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:12px;opacity:0.7">fshij</button>'
        + '</div></div>';
    }).join('') : '<div class="empty-state">Nuk ka shpenzime fikse per ' + muajStr + '.</div>';

    el.innerHTML =
      '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">'
      + '<select onchange="ngarkoShpenzimetFikse(this.value)" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px;color:var(--text);font-family:DM Sans,sans-serif;outline:none">' + muajOpts + '</select>'
      + '</div>'
      + '<div style="background:var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between">'
      + '<span style="color:var(--text2)">Total ' + muajStr + ':</span>'
      + '<strong style="color:var(--error)">-' + fm(totalMuaj) + '</strong></div>'
      + rows;
  } catch(e) {
    const el = document.getElementById('fikse-lista');
    if (el) el.innerHTML = '<div class="empty-state">Gabim: ' + e.message + '</div>';
  }
}

async function ngarkoPaget(muajStr) {
  try {
    const snap = await getDocs(query(collection(db, 'paga'), orderBy('krijuar','desc')));
    const te_gjitha = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    const muajit = te_gjitha.filter(function(s) { return (s.muaji||'').startsWith(muajStr); });
    const muajt = Array.from(new Set(te_gjitha.map(function(s) { return s.muaji||''; }).filter(Boolean))).sort().reverse();

    const el = document.getElementById('paga-lista');
    if (!el) return;

    const totalPaga = muajit.reduce(function(a,s) { return a+(s.shuma||0); }, 0);

    let muajOpts = '<option value="' + muajStr + '">' + muajStr + ' (ky muaj)</option>';
    muajt.forEach(function(m) {
      if (m !== muajStr) muajOpts += '<option value="' + m + '">' + m + '</option>';
    });

    let rows = muajit.length ? muajit.map(function(s) {
      return '<div class="top-row">'
        + '<div class="top-info"><strong>' + (s.punetori||'-') + '</strong>'
        + '<span>' + (s.muaji||'') + (s.shen ? ' &bull; ' + s.shen : '') + '</span></div>'
        + '<div style="text-align:right"><div style="font-weight:700;color:var(--error)">-' + fm(s.shuma||0) + '</div>'
        + '<button data-sid="' + s.id + '" onclick="fshiPagen(this.dataset.sid)" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:12px;opacity:0.7">fshij</button>'
        + '</div></div>';
    }).join('') : '<div class="empty-state">Nuk ka paga te regjistruara per ' + muajStr + '.</div>';

    el.innerHTML =
      '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">'
      + '<select onchange="ngarkoPaget(this.value)" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px;color:var(--text);font-family:DM Sans,sans-serif;outline:none">' + muajOpts + '</select>'
      + '</div>'
      + '<div style="background:var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between">'
      + '<span style="color:var(--text2)">Total paga ' + muajStr + ':</span>'
      + '<strong style="color:var(--error)">-' + fm(totalPaga) + '</strong></div>'
      + rows;
  } catch(e) {
    const el = document.getElementById('paga-lista');
    if (el) el.innerHTML = '<div class="empty-state">Gabim: ' + e.message + '</div>';
  }
}

window.shfaqFotoShpenzim = function(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.7);
      window._shFotoB64 = b64;
      document.getElementById('sh-foto-preview').innerHTML =
        '<img src="' + b64 + '" style="width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:4px">';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
};

// ── REKORD DITOR ──────────────────────────────────
async function kontrolloRekordin(punetor, data, shitjaERe) {
  try {
    // Total i dites aktuale (duke perfshire shitjen e re)
    const shitjetSotPunetor = shitjet.filter(function(s) {
      return s.data === data && s.punetori === punetor;
    });
    const totalSot = shitjetSotPunetor.reduce(function(a,s) { return a+(s.total||0); }, 0) + shitjaERe;

    // Gjej totalin me te larte historik per kete punetor
    const totalPerDite = {};
    shitjet.forEach(function(s) {
      if (s.punetori !== punetor || !s.data || s.data === data) return;
      if (!totalPerDite[s.data]) totalPerDite[s.data] = 0;
      totalPerDite[s.data] += (s.total||0);
    });
    const rekordiMeParë = Object.values(totalPerDite).length
      ? Math.max.apply(null, Object.values(totalPerDite)) : 0;

    // Nëse thyhet rekordi
    if (rekordiMeParë > 0 && totalSot > rekordiMeParë) {
      await tg('REKORD PERSONAL - DOHA Accessories\n\n' + punetor + ' po thyen rekordin ditor!\n\nRekord i ri: ' + fm(totalSot) + '\nRekord i vjeter: ' + fm(rekordiMeParë) + '\nData: ' + data + '\n\nVazhdoni keshtu!');
    }
  } catch(e) { console.warn('rekord check:', e.message); }
}

// ── OFFLINE MODE ──────────────────────────────────
const OFFLINE_STORE = 'doha_offline_queue';

function offlineQueue() {
  try { return JSON.parse(localStorage.getItem(OFFLINE_STORE) || '[]'); } catch(e) { return []; }
}
function offlineSave(queue) {
  localStorage.setItem(OFFLINE_STORE, JSON.stringify(queue));
}

async function shtoPorositOffline(data) {
  const queue = offlineQueue();
  queue.push(Object.assign({}, data, { _offlineId: Date.now() + '_' + Math.random(), _koha: new Date().toISOString() }));
  offlineSave(queue);
  updateOfflineBanner();
}

async function sinkronizoOffline() {
  const queue = offlineQueue();
  if (!queue.length) return;
  let sukses = 0;
  const mbetur = [];
  for (const item of queue) {
    try {
      const { _offlineId, _koha, type, ...data } = item;
      if (type === 'shitje') {
        await addDoc(collection(db, 'shitjet'), Object.assign({}, data, { krijuar: serverTimestamp(), ndryshuar: serverTimestamp() }));
      } else if (type === 'shpenzim') {
        await addDoc(collection(db, 'shpenzime'), Object.assign({}, data, { krijuar: serverTimestamp() }));
      } else if (type === 'arka') {
        await setDoc(doc(db, 'arka', data.uid + '_' + data.data), Object.assign({}, data, { krijuar: serverTimestamp() }));
      }
      sukses++;
    } catch(e) {
      mbetur.push(item);
    }
  }
  offlineSave(mbetur);
  if (sukses > 0) {
    ok(sukses + ' shitje offline u sinkronizuan!');
    updateOfflineBanner();
  }
}

function updateOfflineBanner() {
  const queue = offlineQueue();
  let banner = document.getElementById('offline-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'offline-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:var(--error);color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:600;z-index:9999;display:none';
    document.body.appendChild(banner);
  }
  if (!navigator.onLine) {
    banner.style.display = 'block';
    banner.textContent = '● Offline' + (queue.length > 0 ? ' — ' + queue.length + ' shitje ne pritje' : '');
  } else if (queue.length > 0) {
    banner.style.display = 'block';
    banner.style.background = 'var(--accent)';
    banner.style.color = '#111';
    banner.textContent = '↑ Duke sinkronizuar ' + queue.length + ' shitje...';
    sinkronizoOffline().then(function() {
      if (!offlineQueue().length) banner.style.display = 'none';
    });
  } else {
    banner.style.display = 'none';
  }
}

// Listen for online/offline
window.addEventListener('online', function() { updateOfflineBanner(); sinkronizoOffline(); });
window.addEventListener('offline', function() { updateOfflineBanner(); });

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/shitjet-app/sw.js').then(function(reg) {
    console.log('SW registered');
    // Listen for sync messages from SW
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'DO_SYNC') sinkronizoOffline();
    });
  }).catch(function(e) { console.warn('SW reg failed:', e.message); });
}

// ── PUSH NOTIFICATIONS ─────────────────────────────
async function kerkoPushPermission() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) return;
  if (Notification.permission === 'granted') return;
  if (Notification.permission === 'denied') return;
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    ok('Njoftimet u aktivizuan!');
  }
}

function dergoPushLokal(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  try {
    navigator.serviceWorker.ready.then(function(reg) {
      reg.showNotification(title, {
        body: body,
        icon: '/shitjet-app/icon-192.png',
        vibrate: [200, 100, 200],
        badge: '/shitjet-app/icon-192.png'
      });
    });
  } catch(e) { console.warn('push lokal:', e.message); }
}
