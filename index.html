<!DOCTYPE html>
<html lang="sq">
<head>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f11;--bg2:#17171a;--bg3:#1e1e22;--border:#2a2a30;--text:#f0f0f2;--text2:#8b8b9a;--accent:#f0b429;--accent2:#fb923c;--success:#4ade80;--error:#f87171;--radius:14px;}
  body.light{--bg:#f5f4f0;--bg2:#ffffff;--bg3:#f0ede6;--border:#e0d8cc;--text:#1a1208;--text2:#7a6a50;--accent:#d4941a;--accent2:#e07020;--success:#16a34a;--error:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  /* LOGIN */
  #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 0%, rgba(240,180,41,0.08) 0%, transparent 70%);}
  .login-logo{font-family:'DM Serif Display',serif;font-size:72px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:4px;letter-spacing:-2px;}
  .login-tagline{font-size:11px;color:var(--text2);letter-spacing:6px;text-transform:uppercase;margin-bottom:8px;}
  .login-divider{width:40px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;margin:0 auto 32px;}
  .login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;}
  .tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border-color:transparent;font-weight:700;}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s;margin-bottom:12px;}
  .btn-google:hover{border-color:var(--accent);}
  .login-note{font-size:12px;color:var(--text2);text-align:center;margin-top:8px;}
  /* APP */
  #app-screen{display:none;min-height:100vh;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;}
  .logo{font-family:'DM Serif Display',serif;font-size:24px;padding:24px 20px 16px;color:var(--accent);border-bottom:1px solid var(--border);}
  .logo small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .nav-items-wrap{flex:1;overflow-y:auto;padding:8px 0;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:14px;color:var(--text2);transition:all 0.15s;border-left:3px solid transparent;}
  .nav-item:hover{color:var(--text);background:var(--bg3);}
  .nav-item.active{color:var(--text);background:var(--bg3);border-left-color:var(--accent);}
  .nav-icon{font-size:18px;width:22px;text-align:center;}
  .sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
  .user-info{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .user-avatar-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#111;flex-shrink:0;}
  .user-details{display:flex;flex-direction:column;}
  .user-details span:first-child{font-size:13px;font-weight:600;}
  .user-details span:last-child{font-size:11px;color:var(--text2);}
  .logout-btn{width:100%;background:none;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;}
  .logout-btn:hover{border-color:var(--error);color:var(--error);}
  .main{margin-left:220px;padding:28px;min-height:100vh;padding-bottom:80px;}

  /* Animacione */
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{0%{transform:scale(0.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .fade-up{animation:fadeUp 0.35s ease both}
  .fade-up:nth-child(1){animation-delay:0.02s}
  .fade-up:nth-child(2){animation-delay:0.07s}
  .fade-up:nth-child(3){animation-delay:0.12s}
  .fade-up:nth-child(4){animation-delay:0.17s}
  .fade-up:nth-child(5){animation-delay:0.22s}

  /* FAB - butoni i madh + */
  .fab{position:fixed;bottom:28px;right:28px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#111;font-size:28px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(240,180,41,0.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s;animation:pop 0.4s ease}
  .fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(240,180,41,0.5)}
  .fab:active{transform:scale(0.95)}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
  .page-title{font-family:'DM Serif Display',serif;font-size:32px;}
  .page-sub{font-size:13px;color:var(--text2);margin-top:4px;}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s;}
  .stat-card.accent{border-color:rgba(240,180,41,0.3);background:linear-gradient(135deg,rgba(240,180,41,0.07),var(--bg2));}
  .stat-card.gold{border-color:rgba(240,180,41,0.5);background:linear-gradient(135deg,rgba(240,180,41,0.12),var(--bg2));}
  .stat-icon{font-size:26px;}
  .stat-info{display:flex;flex-direction:column;}
  .stat-val{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
  .chart-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
  .section-title{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;}
  .bar-chart{display:flex;align-items:flex-end;gap:6px;height:110px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;}
  .bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;}
  .bar-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:5px 5px 0 0;min-height:3px;position:relative;}
  .bar-label{font-size:10px;color:var(--text2);}
  .recent-section,.day-group{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
  .link-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;}
  .day-header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:var(--bg3);font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);}
  .day-total{font-weight:700;color:var(--accent);font-size:14px;}
  .shitje-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);transition:background 0.15s;gap:10px;}
  .shitje-row:last-child{border-bottom:none;}
  .shitje-row:hover{background:var(--bg3);}
  .shitje-info{display:flex;flex-direction:column;flex:1;}
  .shitje-info strong{font-size:14px;font-weight:500;}
  .shitje-info span{font-size:12px;color:var(--text2);margin-top:2px;}
  .shitje-total{font-weight:700;font-size:15px;color:var(--success);white-space:nowrap;}
  .punetor-tag{color:var(--accent2);font-weight:500;}
  .shitje-foto{width:52px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;flex-shrink:0;border:1px solid var(--border);}
  .form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
  .form-group{display:flex;flex-direction:column;gap:6px;flex:1;margin-bottom:14px;}
  .form-row{display:flex;gap:14px;}
  .form-group label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
  .form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;outline:none;width:100%;}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
  .total-preview{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:14px;font-size:14px;}
  .total-preview strong{font-size:20px;color:var(--success);}
  .info-box{background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.2);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--accent);margin-bottom:16px;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border:none;border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform 0.15s,box-shadow 0.15s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,180,41,0.3);}
  .btn-primary.small{padding:9px 16px;font-size:13px;}
  .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-secondary.small{padding:9px 16px;font-size:13px;}
  .del-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:11px;transition:all 0.15s;flex-shrink:0;}
  .del-btn:hover{background:rgba(248,113,113,0.1);border-color:var(--error);color:var(--error);}
  .edit-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:12px;transition:all 0.15s;flex-shrink:0;}
  .edit-btn:hover{background:rgba(99,179,237,0.1);border-color:var(--accent);color:var(--accent);}
  .pun-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .pun-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);transition:background 0.15s;}
  .pun-row:last-child{border-bottom:none;}
  .pun-row:hover{background:var(--bg3);}
  .pun-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#111;flex-shrink:0;}
  .pun-avatar.small{width:30px;height:30px;font-size:12px;}
  .pun-info{flex:1;}
  .pun-info strong{display:block;font-size:14px;font-weight:600;}
  .pun-info span{font-size:12px;color:var(--text2);}
  .pun-stats{font-size:12px;color:var(--text2);min-width:80px;text-align:right;}
  .top-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);position:relative;}
  .top-row:last-child{border-bottom:none;}
  .rank{font-size:16px;font-weight:700;color:var(--text2);min-width:28px;}
  .top-info{flex:1;}
  .top-info strong{display:block;font-size:14px;}
  .top-info span{font-size:11px;color:var(--text2);}
  .top-total{font-weight:700;font-size:14px;color:var(--success);min-width:80px;text-align:right;}
  .progress-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border);border-radius:2px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;}
  .empty-state{padding:28px;text-align:center;color:var(--text2);font-size:14px;}
  .raporte-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .rtab{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;}
  .rtab:hover{border-color:var(--accent);color:var(--text);}
  .rtab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border-color:transparent;font-weight:700;}
  .galeria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .galeria-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s;}
  .galeria-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .galeria-card img{width:100%;height:180px;object-fit:cover;display:block;}
  .galeria-info{padding:12px;}
  .galeria-info strong{display:block;font-size:14px;font-weight:600;margin-bottom:4px;}
  .galeria-info span{display:block;font-size:11px;color:var(--text2);margin-top:2px;}
  .foto-upload-zone{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;background:var(--bg3);}
  .btn-foto{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;}
  .btn-foto:hover{border-color:var(--accent);color:var(--accent);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,180,41,0.5)}50%{box-shadow:0 0 0 10px rgba(240,180,41,0)}}
  .stock-pulse-btn{width:100%;background:linear-gradient(135deg,rgba(240,180,41,0.15),rgba(251,146,60,0.1));border:2px solid var(--accent);border-radius:12px;padding:14px;color:var(--accent);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;animation:pulse 2s infinite;transition:all 0.2s;}
  .stock-pulse-btn:hover{background:linear-gradient(135deg,rgba(240,180,41,0.25),rgba(251,146,60,0.2));animation:none;}
  .foto-icon{font-size:32px;display:block;margin-bottom:8px;}
  .foto-hint{font-size:13px;color:var(--text2);}
  .klient-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
  .klient-row:hover{background:var(--bg3);}
  .klient-row:last-child{border-bottom:none;}
  .arka-banner{background:linear-gradient(135deg,rgba(240,180,41,0.1),rgba(251,146,60,0.08));border:1px solid rgba(240,180,41,0.3);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;}
  .arka-admin-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .btn-barazo{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
  .btn-danger{background:none;border:2px solid var(--error);color:var(--error);border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:all 0.2s;}
  .btn-danger:hover{background:var(--error);color:#fff;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:400px;width:100%;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:13px 18px;font-size:14px;font-weight:500;transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:10000;max-width:300px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{border-color:var(--success);color:var(--success);}
  .toast.error{border-color:var(--error);color:var(--error);}
  @media(max-width:768px){
    .sidebar{width:100%;height:56px;flex-direction:row;top:0;bottom:auto;left:0;right:0;padding:0 16px;border-right:none;border-bottom:1px solid var(--border);align-items:center;justify-content:space-between;}
    .logo{display:flex;padding:0;border:none;margin:0;font-size:22px;align-items:center;}
    .logo small{display:none;}
    .sidebar-footer{display:none;}
    .nav-items-wrap{position:fixed;top:56px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);flex-direction:column;padding:8px 0;display:none;z-index:200;overflow-y:auto;max-height:calc(100vh - 56px);}
    .nav-items-wrap.open{display:flex;}
    .nav-item{border-left:none;border-top:none;padding:14px 20px;font-size:15px;width:100%;}
    .nav-item.active{border-left:3px solid var(--accent);border-top:none;}
    .hamburger{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;padding:4px 8px;display:flex;align-items:center;}
    .mobile-dil{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .mobile-dil:hover{border-color:var(--error);color:var(--error);}
    .mobile-user{display:flex;align-items:center;gap:8px;}
    .main{margin-left:0;margin-top:56px;padding:16px;padding-bottom:80px;}
    .fab{bottom:20px;right:16px;width:52px;height:52px;font-size:24px;}
    @media (max-height:500px){.fab{display:none!important;}}
    .form-row{flex-direction:column;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .toast{bottom:16px;right:16px;left:16px;max-width:100%;}
  }
  @media(min-width:769px){
    .hamburger{display:none;}
    .mobile-dil{display:none;}
    .mobile-user{display:none;}
  }
</style>
</head>
<body>

<div id="login-screen" style="display:flex">
  <button onclick="toggleTheme()" id="theme-btn" style="position:absolute;top:16px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);cursor:pointer;font-size:14px;font-family:DM Sans,sans-serif">&#9788;</button>
  <div class="login-logo">DOHA</div>
  <div class="login-tagline">Accessories</div>
  <div class="login-divider"></div>
  <div class="login-card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-admin" onclick="switchTab('admin')">Admin</button>
      <button class="tab-btn" id="tab-punetor" onclick="switchTab('punetor')">Punetor</button>
    </div>

let shitjet = [];

// ── TELEGRAM ──────────────────────────────────────
async function tg(msg) {
  try {
    await fetch('https://api.telegram.org/bot' + TG_TOKEN + '/sendMessage', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: TG_CHAT, text: msg, parse_mode: 'HTML'})
    });
  } catch(e) { console.warn('TG:', e.message); }
}

// ── TOAST ─────────────────────────────────────────
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'');
  setTimeout(function() { t.className = 'toast'; }, 3500);
}
function ok(msg) { toast(msg, 'success'); }
function err(msg) { toast(msg, 'error'); }

// ── FORMAT ────────────────────────────────────────
function fm(v) { return 'EUR ' + (v||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fd(str) {
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('sq', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

// ── AUTH ──────────────────────────────────────────
// Redirect result - nese ka ardhur nga redirect (fallback)
getRedirectResult(auth).then(function(result) {
  if (!result || !result.user) return;
  const email = (result.user.email||'').toLowerCase();
  if (!ADMIN_EMAILS.includes(email)) {
    signOut(auth);
    setTimeout(function() { err('Ky Gmail nuk ka akses si admin!'); }, 500);
  }
}).catch(function(e) { console.warn('redirect:', e.message); });

window.hyrSiAdmin = function() {
  // Perdor gjithmone Popup - me i mire per GitHub Pages ne te gjitha pajisjet
  // Nese popup bllokohet nga browser, provon redirect si fallback
  const btn = document.querySelector('.btn-google');
  if (btn) { btn.textContent = 'Duke u kyqur...'; btn.disabled = true; }
  signInWithPopup(auth, googleProvider).then(function(result) {
    const email = (result.user.email||'').toLowerCase();
    if (!ADMIN_EMAILS.includes(email)) {
      signOut(auth);
      err('Ky Gmail nuk ka akses si admin!');
    }
  }).catch(function(e) {
    // Nese popup u bllokua (mobile browser), provo redirect
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      signInWithRedirect(auth, googleProvider).catch(function(e2) {
        err('Gabim kyqje: ' + e2.message);
      });
    } else {
      err('Gabim: ' + e.message);
    }
    if (btn) { btn.textContent = 'Hyr si Admin me Google'; btn.disabled = false; }
  });
};

window.hyrSiPunetor = function() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) return err('Ploteso te gjitha fushat!');
  signInWithEmailAndPassword(auth, u.toLowerCase() + '@doha-shitje.app', p)
    .catch(function() { err('Username ose fjalekalimi i gabuar!'); });
};

  if (unsubShitjet) { unsubShitjet(); unsubShitjet = null; }

};

  document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');

  document.getElementById('login-admin').style.display = tab === 'admin' ? 'block' : 'none';
  document.getElementById('login-punetor').style.display = tab === 'punetor' ? 'block' : 'none';
};

onAuthStateChanged(auth, async function(user) {
  if (user) {
    currentUser = user;
    isAdmin = ADMIN_EMAILS.includes((user.email||'').toLowerCase());
    isAdminReal = isAdmin;
    const name = isAdmin ? (user.displayName || 'Admin').split(' ')[0] : (user.email||'').split('@')[0];
    const role = isAdmin ? 'Admin' : 'Punetor';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('fab-btn').style.display = 'flex';
    const deskTheme = document.getElementById('desk-theme-btn');
    if (deskTheme) deskTheme.style.display = 'block';
    const previewBtn = document.getElementById('btn-preview-punetor');
    if (previewBtn) previewBtn.style.display = isAdmin ? 'block' : 'none';
    document.getElementById('desk-avatar').textContent = name[0].toUpperCase();
    document.getElementById('desk-name').textContent = name;
    document.getElementById('desk-role').textContent = role;
    document.getElementById('mob-avatar').textContent = name[0].toUpperCase();
    document.getElementById('mob-role').textContent = role;
    ['nav-punetoret','nav-raporte','nav-galeria','nav-backup','nav-klientet','nav-stock'].forEach(function(id) {
      document.getElementById(id).style.display = isAdmin ? 'flex' : 'none';
    });
    await ngarkoData();
    startListen();
    await ngarkoShpenzimetSot();
    if (!isAdmin) await kontrolloArken();
    updateOfflineBanner();
    await kerkoPushPermission();
    // Handle shortcuts nga URL
    const urlParams = new URLSearchParams(window.location.search);
    const shortcut = urlParams.get('shortcut');
    if (shortcut && ['shito','dashboard','shpenzime','posta'].includes(shortcut)) {
      navTo(shortcut);
    } else {
      navTo('dashboard');
    }
  } else {
    currentUser = null;
    isAdmin = false;
    shitjet = [];
    punetoret = [];
    arkaSOT = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('fab-btn').style.display = 'none';
  }
});

// ── DATA ──────────────────────────────────────────
async function ngarkoData() {
  try {
    if (isAdmin) {
      const snap = await getDocs(collection(db, 'punetoret'));
      punetoret = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
    }
  } catch(e) { console.warn('ngarkoData:', e.message); }
}

function startListen() {
  if (unsubShitjet) unsubShitjet();
  const q = query(collection(db, 'shitjet'), orderBy('data', 'desc'));
  unsubShitjet = onSnapshot(q, function(snap) {
    shitjet = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
    if (currentView === 'dashboard') renderDashboard();
    else if (currentView === 'shitjet') renderShitjet();
    else if (currentView === 'raporte') renderRaporte();
  });
  if (unsubPostat) unsubPostat();
  unsubPostat = onSnapshot(collection(db, 'postat'), function(snap) {
    postat = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
    postat.sort(function(a,b) {
      return ((b.krijuar&&b.krijuar.seconds)||0) - ((a.krijuar&&a.krijuar.seconds)||0);
    });
    if (currentView === 'posta') renderPosta();
  }, function(error) {
    console.warn('postat listener error:', error.message);
  });
  if (unsubStock) unsubStock();
  unsubStock = onSnapshot(query(collection(db, 'stock'), orderBy('emri','asc')), function(snap) {
    stock = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
    if (currentView === 'stock') renderStock();
  });
  if (unsubKategorite) unsubKategorite();
  unsubKategorite = onSnapshot(query(collection(db, 'kategorite'), orderBy('emri','asc')), function(snap) {
    kategorite = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); });
    if (currentView === 'stock') renderStock();
    // Rifresh modal-in nese eshte hapur
    if (window._katModalRefresh) window._katModalRefresh();
  });
}

// ── NAV ───────────────────────────────────────────
window.navTo = function(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  const el = document.querySelector('[data-view="' + view + '"]');
  if (el) el.classList.add('active');
  closeMenu();
  const map = {
    dashboard: renderDashboard,
    shito: function() {
      if (!isAdmin && !arkaSOT) { shfaqModalArkes(); return; }
      renderShito();
    },
    shitjet: renderShitjet,
    klientet: renderKlientet,
    punetoret: renderPunetoret,
    raporte: renderRaporte,
    galeria: renderGaleria,
    backup: renderBackup,
    posta: renderPosta,
    shpenzime: renderShpenzime,
    stock: renderStock,
    profili: renderProfili
  };
  if (map[view]) {
    map[view]();
    // Animacion fade-up per elementet kryesore
    setTimeout(function() {
      const content = document.getElementById('content');
      if (!content) return;
      content.querySelectorAll('.stat-card, .form-card, .chart-section, .recent-section, .page-header').forEach(function(el) {
        el.classList.remove('fade-up');
        void el.offsetWidth; // reflow
        el.classList.add('fade-up');
      });
    }, 10);
  }
};

window.toggleMenu = function() {
  const w = document.getElementById('nav-wrap');
  const b = document.getElementById('hamburger-btn');
  w.classList.toggle('open');
  b.innerHTML = w.classList.contains('open') ? '&#10005;' : '&#9776;';
};

window.togglePreviewPunetor = function() {
  previewMode = !previewMode;
  const banner = document.getElementById('preview-banner');
  const btn = document.getElementById('btn-preview-punetor');

  if (previewMode) {
    // Aktivizo preview si punetor
    banner.style.display = 'flex';
    document.getElementById('content').style.marginTop = '44px';
    // Fshih nav items te adminit
    ['nav-punetoret','nav-raporte','nav-galeria','nav-backup','nav-klientet','nav-stock'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    btn.textContent = '✕ Dil nga Preview';
    btn.style.borderColor = 'var(--error)';
    btn.style.color = 'var(--error)';
    navTo('dashboard');
  } else {
    // Kthehu te admin
    banner.style.display = 'none';
    document.getElementById('content').style.marginTop = '';
    // Rishfaq nav items e adminit
    ['nav-punetoret','nav-raporte','nav-galeria','nav-backup','nav-klientet','nav-stock'].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = 'flex';

    btn.textContent = '👁 Shih si Punëtore';
    btn.style.borderColor = 'rgba(240,180,41,0.4)';
    btn.style.color = 'var(--accent)';
    navTo('dashboard');

};

window.closeMenu = function() {

window.toggleTheme = function() {

  btns.forEach(function(b) { b.textContent = isLight ? '☾' : '☀'; });

(function() {

    document.body.classList.add('light');

// ── DASHBOARD ─────────────────────────────────────
function renderDashboard() {
  const sot = new Date();
  const sotStr = sot.toISOString().split('T')[0];
  // Per admin shfaq te gjitha, per puntor fshih shitjet e postes
  const shitjetSot = isAdminView()
    ? shitjet.filter(function(s) { return s.data === sotStr; })
    : shitjet.filter(function(s) { return s.data === sotStr && s.punetoriUid === currentUser.uid; });
  const totalSot = shitjetSot.reduce(function(a,s) { return a + (s.total||0); }, 0);
  const muaj = sot.getMonth(), vit = sot.getFullYear();
  const totalMuaj = shitjet.filter(function(s) {
    const d = new Date(s.data); return d.getMonth() === muaj && d.getFullYear() === vit;
  }).reduce(function(a,s) { return a + (s.total||0); }, 0);

  const chart7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().split('T')[0];
    const lbl = d.toLocaleDateString('sq', {weekday:'short'});
    const tot = shitjet.filter(function(s) { return s.data === ds; }).reduce(function(a,s) { return a+(s.total||0); }, 0);
    chart7.push({label: lbl, total: tot});
  }
  const maxV = Math.max.apply(null, chart7.map(function(d) { return d.total; }).concat([1]));

  // Produkti #1 i dites
  const byProdSot = {};
  shitjetSot.forEach(function(s) {
    const pks = (s.produkti||'').toLowerCase().trim();
    if (!byProdSot[pks]) byProdSot[pks] = {total:0, emri:s.produkti||''};
    byProdSot[pks].total += (s.total||0);
  });
  const prod1SotEntry = Object.entries(byProdSot).sort(function(a,b) { return b[1].total-a[1].total; })[0];
  const prod1Sot = prod1SotEntry ? prod1SotEntry[1].emri : '';

  const listaSot = isAdminView()
    ? shitjet.slice(0,5)
    : shitjet.filter(function(s) { return s.data === sotStr && s.punetoriUid !== 'admin_posta'; }).slice(0,5);

  let arkaBanner = '';
  if (isAdmin) {
    arkaBanner = '<div class="arka-admin-panel"><div class="section-title" style="margin-bottom:12px">GJENDJA E ARKES SOT</div><div id="admin-arka-rows"><div style="color:var(--text2);font-size:13px;padding:8px">Duke ngarkuar...</div></div></div>';
  } else {
    if (!arkaSOT) {
      arkaBanner = '<div class="arka-banner"><div style="display:flex;justify-content:space-between;align-items:center">'
        + '<span style="color:var(--text2);font-size:14px">Regjistro arken para shitjeve</span>'
        + '<button class="btn-primary small" onclick="shfaqModalArkes()">+ Regjistro</button>'
        + '</div></div>';
    } else {
      const barazoBtn = arkaSOT.mbyllur
        ? '<span style="color:var(--success);font-weight:600">Arka e mbyllur</span>'
        : '<button class="btn-barazo" onclick="shfaqBarazimin()">Barazo Arken</button>';
      arkaBanner = '<div class="arka-banner"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">'
        + '<div><div style="font-size:11px;color:var(--text2);margin-bottom:4px">ARKA SOT</div>'
        + '<div style="font-size:20px;font-weight:700;color:var(--accent)">' + fm(arkaSOT.fillimiArkes||0) + '</div></div>'
        + barazoBtn + '</div></div>';
    }
  }

  let bars = '';
  chart7.forEach(function(d) {
    bars += '<div class="bar-col">'
      + '<div class="bar-wrap"><div class="bar-fill" style="height:' + (d.total/maxV*100) + '%"></div></div>'
      + '<span class="bar-label">' + d.label + '</span></div>';
  });

  let rows = '';
  listaSot.forEach(function(s) {
    if (s.id && s.fotoUrl) fotoMap[s.id] = s.fotoUrl;
    const foto = s.fotoUrl ? '<img src="' + s.fotoUrl + '" class="shitje-foto" onclick="shfaqFotoById(\'' + (s.id||'') + '\')">' : '';
    rows += '<div class="shitje-row">' + foto
      + '<div class="shitje-info"><strong>' + s.produkti + '</strong>'
      + '<span>' + s.data + ' &bull; ' + (s.punetori||'-') + '</span></div>'
      + '<div class="shitje-total">' + fm(s.total) + '</div></div>';
  });
  if (!rows) rows = '<div class="empty-state">Nuk ka shitje sot.</div>';

  document.getElementById('content').innerHTML =
    '<div class="page-header"><div><h1 class="page-title">Miresevini</h1>'
    + '<p class="page-sub">' + sot.toLocaleDateString('sq', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + '</p></div></div>'
    + arkaBanner
    + '<div class="stats-grid">'
    + '<div class="stat-card accent"><div class="stat-icon">&#128176;</div><div class="stat-info"><span class="stat-val">' + fm(totalSot) + '</span><span class="stat-label">Sot</span></div></div>'
    + (isAdminView() ? '<div class="stat-card"><div class="stat-icon">&#128197;</div><div class="stat-info"><span class="stat-val">' + fm(totalMuaj) + '</span><span class="stat-label">Ky Muaj</span></div></div>' : '')
    + '<div class="stat-card"><div class="stat-icon">&#128222;</div><div class="stat-info"><span class="stat-val">' + shitjetSot.length + '</span><span class="stat-label">Fatura Sot</span></div></div>'
    + (isAdminView() && prod1Sot ? '<div class="stat-card gold"><div class="stat-icon">&#127942;</div><div class="stat-info"><span class="stat-val" style="font-size:15px">' + prod1Sot + '</span><span class="stat-label">#1 Sot</span></div></div>' : '')
    + '</div>'
    + '<div class="chart-section"><div class="section-title">7 Ditet e Fundit</div>'
    + '<div class="bar-chart">' + bars + '</div></div>'
    + '<div class="recent-section">'
    + '<div class="section-header"><div class="section-title">Shitjet e Fundit</div>'
    + '<button class="link-btn" onclick="navTo(\'shitjet\')">Shiko te gjitha</button></div>'
    + rows + '</div>';
  if (isAdminView()) ngarkoArkaAdmin();
}

window.ngarkoArkaAdmin = async function() {
  const sotStr = new Date().toISOString().split('T')[0];
  const el = document.getElementById('admin-arka-rows');
  if (!el) return;
  try {
    const snap = await getDocs(collection(db, 'arka'));
    const arkat = snap.docs.map(function(d) { return Object.assign({id: d.id}, d.data()); })
      .filter(function(a) { return a.data === sotStr; })
      .sort(function(a,b) { return (a.punetori||'').localeCompare(b.punetori||''); });
    if (!arkat.length) {
      el.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px">Asnje punetor nuk ka regjistruar arken sot.</div>';
      return;
    }
    let html = '';
    arkat.forEach(function(a) {
      const hapur = a.fillimiArkes !== undefined;
      const mbyllur = a.mbyllur === true;
      const rezultati = a.rezultati || '';
      const statusColor = mbyllur ? (rezultati === 'ok' ? 'var(--success)' : 'var(--error)') : 'var(--accent)';
      const statusTxt = mbyllur ? (rezultati === 'ok' ? 'Barazuar OK' : 'Dallim!') : 'E hapur';
      const hapBtn = mbyllur
        ? '<button data-arkaid="' + a.id + '" onclick="hapArkenPeserish(this.dataset.arkaid)" style="background:none;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif">Hap perseri</button>'
        : '';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px">'
        + '<div>'
        + '<strong style="font-size:14px">' + (a.punetori||'—') + '</strong>'
        + '<div style="font-size:12px;color:var(--text2);margin-top:2px">'
        + 'Fillim: ' + fm(a.fillimiArkes||0)
        + (mbyllur ? ' &nbsp;|&nbsp; Shitje: +' + fm(a.totalShitje||0) : '')
        + (mbyllur && a.shumaReale !== undefined ? ' &nbsp;|&nbsp; Reale: ' + fm(a.shumaReale) : '')
        + (mbyllur && rezultati !== 'ok' && a.koment ? '<br><em>' + a.koment + '</em>' : '')
        + '</div></div>'
        + '<div style="display:flex;align-items:center;gap:8px">'
        + '<span style="font-size:12px;font-weight:600;color:' + statusColor + '">' + statusTxt + '</span>'
        + hapBtn
        + '</div></div>';
    });
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div style="color:var(--error);font-size:13px">Gabim: ' + e.message + '</div>'; }
};

window.hapArkenPeserish = async function(arkaId) {
  if (!confirm('A jeni i sigurt qe doni ta hapni arken perseri?')) return;
  try {
    await updateDoc(doc(db, 'arka', arkaId), {
      mbyllur: false, rezultati: null, shumaReale: null,
      totalShitje: null, dallimi: null, koment: null, mbyllurNe: null
    });
    ok('Arka u hap perseri!');
    ngarkoArkaAdmin();
    await tg('ARKA U HAP PERSERI - DOHA Accessories\n\nAdmin hapi arken perseri: ' + arkaId.split('_')[0]);
  } catch(e) { err('Gabim: ' + e.message); }
};

// Stock i zgjedhur aktualisht
let stockIZgjedhur = null;

window.hapStockSelector = function() {
  if (!stock.length) return err('Nuk ka stock te regjistruar!');
  renderStockSelector('', '');
};

function renderStockSelector(kerkim, kategoriaId) {
  document.getElementById('modal-stock-sel')?.remove();

  const filtered = stock.filter(function(p) {
    const matchK = !kerkim || (p.emri||'').toLowerCase().includes(kerkim.toLowerCase());
    const matchKat = !kategoriaId || p.kategoriaId === kategoriaId;
    return matchK && matchKat;
  });

  // Kategori tabs
  let katTabs = '<button class="rtab ' + (!kategoriaId ? 'active' : '') + '" onclick="filtroProdSel(\'\')" style="font-size:12px;padding:6px 12px">Te gjitha</button>';
  kategorite.forEach(function(k) {
    const nr = stock.filter(function(p) { return p.kategoriaId === k.id; }).length;
    katTabs += '<button class="rtab ' + (kategoriaId === k.id ? 'active' : '') + '" data-kid="' + k.id + '" onclick="filtroProdSel(this.dataset.kid)" style="font-size:12px;padding:6px 12px">' + k.emri + ' <span style="opacity:0.6">(' + nr + ')</span></button>';
  });

  let rows = '';
  filtered.forEach(function(p) {
    const ngjyra = p.lloji !== 'set' && (p.sasia||0) <= (p.sasiaMin||3) ? 'var(--error)' : 'var(--success)';
    const eshteSet = p.lloji === 'set';
    const setBadge = eshteSet ? ' <span style="background:rgba(251,146,60,0.2);color:var(--accent2);font-size:10px;padding:1px 6px;border-radius:10px">SET</span>' : '';
    const fotoHtml = p.fotoUrl
      ? '<img src="' + p.fotoUrl + '" style="width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;cursor:zoom-in" onclick="event.stopPropagation();zoomFotoSrc(this.src)">'
      : '<div style="width:52px;height:52px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">&#128247;</div>';
    rows += '<div data-sid="' + p.id + '" onclick="zgjidhStokun(this.dataset.sid)" style="padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:12px;align-items:center" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'">'
      + fotoHtml
      + '<div style="flex:1"><div style="font-weight:600;font-size:14px">' + p.emri + setBadge + '</div>'
      + '<div style="font-size:12px;color:var(--text2)">' + (eshteSet ? 'Set i plote &bull; ' : '') + fm(p.cmimiShitjes) + '</div></div>'
      + (!eshteSet ? '<div style="text-align:right"><div style="font-size:13px;font-weight:600;color:' + ngjyra + '">' + (p.sasia||0) + ' cope</div></div>' : '')
      + '</div>';
  });
  if (!rows) rows = '<div class="empty-state" style="padding:20px">Nuk ka produkte' + (kerkim ? ' per "' + kerkim + '"' : '') + '.</div>';

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modal-stock-sel';
  ov.innerHTML = '<div class="modal-box" style="padding:0;max-height:85vh;display:flex;flex-direction:column">'
    + '<div style="padding:14px 16px;border-bottom:1px solid var(--border)">'
    + '<input type="text" id="sel-kerkim" value="' + kerkim + '" placeholder="Kerko produkt..." oninput="filtroProdSelKerkim(this.value)" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-family:DM Sans,sans-serif;outline:none;box-sizing:border-box">'
    + (kategorite.length ? '<div class="raporte-tabs" style="margin-top:10px;flex-wrap:wrap;gap:4px">' + katTabs + '</div>' : '')
    + '</div>'
    + '<div style="overflow-y:auto;flex:1">' + rows + '</div>'
    + '<div style="padding:12px 16px;border-top:1px solid var(--border)">'
    + '<button onclick="document.getElementById(\'modal-stock-sel\').remove()" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text);cursor:pointer;font-family:DM Sans,sans-serif">Vazhdo pa stock</button>'
    + '</div></div>';
  document.body.appendChild(ov);
  setTimeout(function() {
    const inp = document.getElementById('sel-kerkim');
    if (inp) inp.focus();
  }, 100);
}

// Store current selector filters
let _selKerkim = '';
let _selKat = '';

window.filtroProdSelKerkim = function(val) {
  _selKerkim = val;
  renderStockSelector(_selKerkim, _selKat);
};

window.filtroProdSel = function(katId) {
  _selKat = katId;
  renderStockSelector(_selKerkim, _selKat);
};

window.zgjidhStokun = function(id) {
  document.getElementById('modal-stock-sel')?.remove();
  const p = stock.find(function(s) { return s.id === id; });
  if (!p) return;

  if (p.lloji === 'set') {
    // Hap modal per set me checkboxes
    hapSetSelectorModal(p);
    return;
  }

  // Produkt normal
  stockIZgjedhur = p;
  const prodEl = document.getElementById('s-prod');
  const cmiEl = document.getElementById('s-cmi');
  const njesEl = document.getElementById('s-njes');
  if (prodEl) prodEl.value = p.emri;
  if (cmiEl) cmiEl.value = p.cmimiShitjes;
  if (njesEl) njesEl.value = 'cop';
  const infoBox = document.getElementById('stock-selected-info');
  const infoEmri = document.getElementById('stock-selected-emri');
  const infoDetail = document.getElementById('stock-selected-info2');
  if (infoBox) infoBox.style.display = 'block';
  if (infoEmri) infoEmri.textContent = p.emri;
  if (infoDetail) infoDetail.textContent = 'Cmimi shitjes: ' + fm(p.cmimiShitjes) + ' \u2022 Ne stock: ' + (p.sasia||0) + ' cope';
  llogarit();
  llogaritDheKontrolloZbritje();
};

window.kerkoProduktin = function(val) {
  const box = document.getElementById('prod-suggestions');
  if (!box) return;
  const v = (val||'').trim().toLowerCase();
  // Build map: produkti -> {count, total, cmimi i fundit, njesia e fundit}
  const prodMap = {};
  shitjet.forEach(function(s) {
    if (!s.produkti) return;
    const k = (s.produkti||"").toLowerCase().trim();
    if (!prodMap[k]) prodMap[k] = {count:0, total:0, cmimi:0, njesia:'cop', data:'', emri:s.produkti||""};
    prodMap[k].count++;
    prodMap[k].total += (s.total||0);
    if (!prodMap[k].data || (s.data||'') > prodMap[k].data) {
      prodMap[k].data = s.data||'';
      prodMap[k].cmimi = s.cmimi||0;
      prodMap[k].njesia = s.njesia||'cop';
    }
  });
  // Filter and sort by count
  const results = Object.entries(prodMap)
    .filter(function(e) { return !v || e[0].toLowerCase().includes(v); })
    .sort(function(a,b) { return b[1].count - a[1].count; })
    .slice(0, 6);
  if (!results.length || !val) { box.innerHTML = ''; return; }
  let html = '<div style="position:absolute;left:0;right:0;background:var(--bg2);border:1px solid var(--accent);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);overflow:hidden;margin-top:2px">';
  results.forEach(function(e) {
    const name = e[0], d = e[1];
    html += '<div onclick="zgjidhProduktin(' + JSON.stringify(name) + ',' + d.cmimi + ',' + JSON.stringify(d.njesia) + ')" '
      + 'style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center" '
      + 'onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'">'
      + '<div><div style="font-weight:600;font-size:14px">' + name + '</div>'
      + '<div style="font-size:11px;color:var(--text2)">' + d.count + ' here shitur</div></div>'
      + '<div style="text-align:right"><div style="font-size:13px;font-weight:600;color:var(--accent)">' + fm(d.cmimi) + '</div>'
      + '<div style="font-size:11px;color:var(--text2)">' + d.njesia + '</div></div>'
      + '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
};

// Resize foto dhe ktheje si Base64
function resizeDheBase64(file, maxPx) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onerror = function() { reject(new Error('Leximi i fotos deshtoi')); };
    reader.onload = function(e) {
      const img = new Image();
      img.onerror = function() { reject(new Error('Foto e pavlefshme')); };
      img.onload = function() {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Quality 0.75 - balance mes madhesise dhe cilesise
        const b64 = canvas.toDataURL('image/jpeg', 0.75);
        resolve(b64);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

window.ruajShitjen = async function() {

// ── SHITJET ───────────────────────────────────────
function renderShitjet() {
  const sotStr = new Date().toISOString().split('T')[0];
  const lista = isAdminView() ? shitjet : shitjet.filter(function(s) { return s.data === sotStr && s.punetoriUid !== 'admin_posta'; });

  // Rendit sipas krijuar (timestamp) - me i riu pari
  const listaSorted = lista.slice().sort(function(a, b) {
    const aT = a.krijuar && a.krijuar.seconds ? a.krijuar.seconds : 0;
    const bT = b.krijuar && b.krijuar.seconds ? b.krijuar.seconds : 0;
    if (aT !== bT) return bT - aT;
    return (b.data||'').localeCompare(a.data||'');
  });

  const grouped = {};
  listaSorted.forEach(function(s) {
    if (!grouped[s.data]) grouped[s.data] = [];
    grouped[s.data].push(s);
  });
  const rows = Object.entries(grouped).sort(function(a,b) { return b[0].localeCompare(a[0]); }).slice(0,30);

  let html = '<div class="page-header"><h1 class="page-title">' + (isAdminView() ? 'Te gjitha Shitjet' : 'Shitjet Sot') + '</h1>'
    + '<button class="btn-primary small" onclick="navTo(\'shito\')">+ Shitje e Re</button></div>';
  if (!isAdminView()) html += '<div class="info-box">Po shfaqen vetem shitjet e sotme</div>';
  if (!rows.length) html += '<div class="empty-state">Nuk ka shitje.</div>';

  rows.forEach(function(entry) {
    const data = entry[0], items = entry[1];
    const dayTot = items.reduce(function(a,s) { return a+(s.total||0); }, 0);
    html += '<div class="day-group"><div class="day-header"><span>' + fd(data) + '</span><span class="day-total">' + fm(dayTot) + '</span></div>';
    items.forEach(function(s) {
      if (s.id && s.fotoUrl) fotoMap[s.id] = s.fotoUrl;
      const foto = s.fotoUrl ? '<img src="' + s.fotoUrl + '" class="shitje-foto" onclick="shfaqFotoById(\'' + (s.id||'') + '\')">' : '';
      const ora = s.krijuar && s.krijuar.seconds
        ? '<span style="font-size:11px;color:var(--text2)">' + new Date(s.krijuar.seconds*1000).toLocaleTimeString('sq',{hour:'2-digit',minute:'2-digit'}) + '</span> '
        : '';
      const delBtn = isAdminView() ? '<button class="del-btn" onclick="fshijShitje(\'' + s.id + '\')">&#10005;</button>' : '';
      const editBtn = '<button class="edit-btn" data-id="' + s.id + '" onclick="hapEditShitje(this.dataset.id)">&#9998;</button>';
      html += '<div class="shitje-row">' + foto
        + '<div class="shitje-info">' + ora + '<strong>' + s.produkti + '</strong>'
        + '<span>' + s.sasia + ' ' + (s.njesia||'cop') + ' x ' + fm(s.cmimi)
        + (s.klienti ? ' &bull; ' + s.klienti : '')
        + ' &bull; <span class="punetor-tag">' + (s.punetori||'-') + '</span>'
        + (s.shen ? ' &bull; ' + s.shen : '') + '</span></div>'
        + '<div style="display:flex;align-items:center;gap:8px"><div class="shitje-total">' + fm(s.total) + '</div>' + editBtn + delBtn + '</div></div>';
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
}

// ── KLIENTET ──────────────────────────────────────
function renderKlientet() {
  const byK = {};
  shitjet.forEach(function(s) {
    if (!s.klienti) return;
    if (!byK[s.klienti]) byK[s.klienti] = {total:0, count:0};
    byK[s.klienti].total += s.total||0;
    byK[s.klienti].count++;
  });
  const list = Object.entries(byK).sort(function(a,b) { return b[1].total - a[1].total; });
  let html = '<div class="page-header"><h1 class="page-title">Klientet</h1></div>'
    + '<div class="pun-list">';
  if (!list.length) html += '<div class="empty-state">Nuk ka klient te regjistruar.</div>';
  list.forEach(function(entry) {
    const emri = entry[0], d = entry[1];
    html += '<div class="klient-row" onclick="shfaqKlientin(\'' + emri.replace(/'/g,"&#39;") + '\')">'
      + '<div class="pun-avatar">' + emri[0].toUpperCase() + '</div>'
      + '<div class="pun-info"><strong>' + emri + '</strong><span>' + d.count + ' blerje</span></div>'
      + '<div class="pun-stats">' + fm(d.total) + '</div>'
      + '<span style="color:var(--text2)">&#8250;</span></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

window.shfaqKlientin = function(emri) {
  const list = shitjet.filter(function(s) { return s.klienti === emri; }).sort(function(a,b) { return (b.data||'').localeCompare(a.data||''); });
  const tot = list.reduce(function(a,s) { return a+(s.total||0); }, 0);
  let html = '<div class="page-header"><div><h1 class="page-title">' + emri + '</h1>'
    + '<p class="page-sub">' + list.length + ' blerje &bull; ' + fm(tot) + '</p></div>'
    + '<button class="btn-secondary small" onclick="navTo(\'klientet\')">&#8592; Klientet</button></div>'
    + '<div class="day-group">';
  if (!list.length) html += '<div class="empty-state">Nuk ka blerje.</div>';
  list.forEach(function(s) {
    if (s.id && s.fotoUrl) fotoMap[s.id] = s.fotoUrl;
    const foto = s.fotoUrl ? '<img src="' + s.fotoUrl + '" class="shitje-foto" onclick="shfaqFotoById(\'' + (s.id||'') + '\')">' : '';
    html += '<div class="shitje-row">' + foto
      + '<div class="shitje-info"><strong>' + s.produkti + '</strong>'
      + '<span>' + s.data + ' &bull; ' + s.sasia + ' ' + (s.njesia||'cop') + (s.shen?' &bull; '+s.shen:'') + '</span></div>'
      + '<div class="shitje-total">' + fm(s.total) + '</div></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
};

// ── PUNETORET ─────────────────────────────────────

  let rows = '';
  punetoret.forEach(function(p) {

    rows += '<div class="pun-row">'

    + '<div class="form-row">'
    + '<div class="form-group"><label>Emri</label><input type="text" id="p-emri" placeholder="Agim Berisha"></div>'
    + '<div class="form-group"><label>Username</label><input type="text" id="p-user" placeholder="agim"></div>'
    + '<div class="form-group"><label>Fjalekalimi</label><input type="password" id="p-pass" placeholder="min. 6 karaktere"></div>'
    + '</div>'
    + '<button class="btn-primary" onclick="shtoPunetor()">+ Shto Punetorin</button>'
    + '</div>'

window.shtoPunetor = async function() {
  const emri = document.getElementById('p-emri').value.trim();
  const username = document.getElementById('p-user').value.trim().toLowerCase();
  const pass = document.getElementById('p-pass').value.trim();
  if (!emri||!username||!pass) return err('Ploteso te gjitha fushat!');
  if (pass.length < 6) return err('Fjalekalimi min. 6 karaktere!');
  try {
    const email = username + '@doha-shitje.app';
    const res = await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=AIzaSyARmBXSgjkjm9tVZDZL2hV52DtoikbZMKs', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: email, password: pass, returnSecureToken: true})
    });
    const data = await res.json();
    if (data.error) return err('Gabim: ' + (data.error.message === 'EMAIL_EXISTS' ? 'Username ekziston!' : data.error.message));
    await setDoc(doc(db, 'punetoret', data.localId), {emri: emri, username: username, email: email, uid: data.localId, krijuar: new Date().toISOString()});
    punetoret.push({id: data.localId, emri: emri, username: username, uid: data.localId});
    ok('Punetori "' + emri + '" u shtua!');
    document.getElementById('p-emri').value=''; document.getElementById('p-user').value=''; document.getElementById('p-pass').value='';
    renderPunetoret();
  } catch(e) { err('Gabim: ' + e.message); }
};

window.fshijPunetor = async function(id) {
  if (!confirm('Fshij punetorin?')) return;
  try {
    await deleteDoc(doc(db, 'punetoret', id));
    punetoret = punetoret.filter(function(p) { return p.id !== id; });
    ok('U fshi!'); renderPunetoret();
  } catch(e) { err(e.message); }
};

// ── RAPORTE ───────────────────────────────────────
function renderRaporte() {
  if (!isAdminView()) return;
  const sot = new Date();
  const muajet = ['Janar','Shkurt','Mars','Prill','Maj','Qershor','Korrik','Gusht','Shtator','Tetor','Nentor','Dhjetor'];
  const totalGjith = shitjet.reduce(function(a,s) { return a+(s.total||0); }, 0);

  const byMuaj = {};
  shitjet.forEach(function(s) {
    if (!s.data) return;
    const d = new Date(s.data+'T12:00:00');
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!byMuaj[key]) byMuaj[key] = {total:0, count:0, muaji:d.getMonth(), viti:d.getFullYear()};
    byMuaj[key].total += s.total||0; byMuaj[key].count++;
  });
  const muajSort = Object.entries(byMuaj).sort(function(a,b) { return b[0].localeCompare(a[0]); });

  const byVit = {};
  shitjet.forEach(function(s) {
    if (!s.data) return;
    const v = new Date(s.data+'T12:00:00').getFullYear();
    if (!byVit[v]) byVit[v] = {total:0, count:0};
    byVit[v].total += s.total||0; byVit[v].count++;
  });
  const vitSort = Object.entries(byVit).sort(function(a,b) { return b[0]-a[0]; });

  function getWeek(ds) {
    const d = new Date(ds+'T12:00:00');
    const s = new Date(d); s.setDate(d.getDate()-d.getDay()+1);
    return s.toISOString().split('T')[0];
  }
  const byJava = {};
  shitjet.forEach(function(s) {
    if (!s.data) return;
    const k = getWeek(s.data);
    if (!byJava[k]) byJava[k] = {total:0, count:0};
    byJava[k].total += s.total||0; byJava[k].count++;
  });
  const javaSort = Object.entries(byJava).sort(function(a,b) { return b[0].localeCompare(a[0]); });

  const byProd = {};
  shitjet.forEach(function(s) {
    const pk = (s.produkti||"").toLowerCase().trim();
    if (!byProd[pk]) byProd[pk] = {total:0, count:0, emri:s.produkti||""};
    byProd[pk].total += s.total||0; byProd[pk].count++;
  });
  const prodSort = Object.entries(byProd).sort(function(a,b) { return b[1].count-a[1].count; }).slice(0,8);

  const byPun = {};
  shitjet.forEach(function(s) {
    const k = s.punetori||'-';
    if (!byPun[k]) byPun[k] = {total:0, count:0};
    byPun[k].total += s.total||0; byPun[k].count++;
  });
  const punSort = Object.entries(byPun).sort(function(a,b) { return b[1].total-a[1].total; });

  function makeRows(arr, labelFn, maxVal) {
    if (!arr.length) return '<div class="empty-state">Nuk ka te dhena.</div>';
    let h = '';
    arr.forEach(function(entry, i) {
      const k = entry[0], d = entry[1];
      const pct = maxVal > 0 ? (d.total/maxVal*100) : 0;
      h += '<div class="top-row">'
        + (labelFn === 'rank' ? '<span class="rank">#' + (i+1) + '</span>' : '<div class="pun-avatar small">' + k[0].toUpperCase() + '</div>')
        + '<div class="top-info"><strong>' + labelFn(k, d) + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    return h;
  }

  let tabContent = '';
  // ── Krahasim muaj me muaj ──
  const muajSortKrahasim = Object.entries(byMuaj).sort(function(a,b) { return a[0].localeCompare(b[0]); });
  let krahasimRows = '';
  if (muajSortKrahasim.length >= 2) {
    for (let i = muajSortKrahasim.length - 1; i >= 1; i--) {
      const cur = muajSortKrahasim[i], prev = muajSortKrahasim[i-1];
      const diff = cur[1].total - prev[1].total;
      const pct = prev[1].total > 0 ? ((diff / prev[1].total) * 100) : 0;
      const arrow = diff >= 0 ? '&#9650;' : '&#9660;';
      const col = diff >= 0 ? 'var(--success)' : 'var(--error)';
      krahasimRows += '<div class="top-row">'
        + '<div class="top-info"><strong>' + muajet[cur[1].muaji] + ' ' + cur[1].viti + '</strong>'
        + '<span>' + muajet[prev[1].muaji] + ': ' + fm(prev[1].total) + '</span></div>'
        + '<div style="text-align:right"><div class="top-total">' + fm(cur[1].total) + '</div>'
        + '<div style="font-size:12px;color:' + col + ';font-weight:600">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%'
        + ' (' + (diff >= 0 ? '+' : '') + fm(diff) + ')</div></div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(100, Math.abs(pct)) + '%;background:' + col + '"></div></div></div>';
    }
  } else {
    krahasimRows = '<div class="empty-state">Duhen te pakten 2 muaj te dhena.</div>';
  }

  // ── Ora me produktive ──
  const byOra = {};
  for (let h = 0; h < 24; h++) byOra[h] = {total: 0, count: 0};
  shitjet.forEach(function(s) {
    if (!s.krijuar || !s.krijuar.seconds) return;
    const ora = new Date(s.krijuar.seconds * 1000).getHours();
    byOra[ora].total += (s.total||0);
    byOra[ora].count++;
  });
  const oratAktive = Object.entries(byOra).filter(function(e) { return e[1].count > 0; });
  const maxOra = oratAktive.length ? Math.max.apply(null, oratAktive.map(function(e) { return e[1].total; })) : 1;
  let oraRows = '';
  if (oratAktive.length) {
    oratAktive.sort(function(a,b) { return b[1].total - a[1].total; }).slice(0, 8).forEach(function(entry) {
      const h = parseInt(entry[0]);
      const d = entry[1];
      const lbl = String(h).padStart(2,'0') + ':00 - ' + String(h+1).padStart(2,'0') + ':00';
      const pct = maxOra > 0 ? (d.total/maxOra*100) : 0;
      oraRows += '<div class="top-row"><div class="top-info"><strong>' + lbl + '</strong>'
        + '<span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
  } else {
    oraRows = '<div class="empty-state">Nuk ka te dhena me timestamp (shitjet e vjetra nuk kane ore).</div>';
  }

  if (raporteTab === 'muaji') {
    const max = muajSort.length ? muajSort[0][1].total : 1;
    let h = '';
    muajSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="top-info"><strong>' + muajet[d.muaji] + ' ' + d.viti + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'viti') {
    const max = vitSort.length ? vitSort[0][1].total : 1;
    let h = '';
    vitSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="top-info"><strong>' + k + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'java') {
    const max = javaSort.length ? javaSort[0][1].total : 1;
    let h = '';
    javaSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const ds = new Date(k+'T12:00:00');
      const de = new Date(ds); de.setDate(ds.getDate()+6);
      const lbl = ds.toLocaleDateString('sq',{day:'numeric',month:'short'}) + ' - ' + de.toLocaleDateString('sq',{day:'numeric',month:'short',year:'numeric'});
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="top-info"><strong>' + lbl + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'produkte') {
    const max = prodSort.length ? prodSort[0][1].total : 1;
    let h = '';
    prodSort.forEach(function(entry, i) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      const emri = d.emri ? d.emri.charAt(0).toUpperCase() + d.emri.slice(1).toLowerCase() : k;
      h += '<div class="top-row"><span class="rank">#' + (i+1) + '</span>'
        + '<div class="top-info"><strong>' + emri + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'punetore') {
    const max = punSort.length ? punSort[0][1].total : 1;
    let h = '';
    punSort.forEach(function(entry) {
      const k = entry[0], d = entry[1];
      const pct = max > 0 ? (d.total/max*100) : 0;
      h += '<div class="top-row"><div class="pun-avatar small">' + k[0].toUpperCase() + '</div>'
        + '<div class="top-info"><strong>' + k + '</strong><span>' + d.count + ' shitje</span></div>'
        + '<div class="top-total">' + fm(d.total) + '</div>'
        + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div></div>';
    });
    tabContent = h || '<div class="empty-state">Nuk ka te dhena.</div>';
  } else if (raporteTab === 'krahasim') {
    tabContent = krahasimRows;
  } else if (raporteTab === 'ora') {
    tabContent = oraRows;
  } else if (raporteTab === 'heatmap') {
    // Build heatmap for last 12 months
    const sot = new Date();
    const totalPerDite = {};
    shitjet.forEach(function(s) {
      if (!s.data) return;
      if (!totalPerDite[s.data]) totalPerDite[s.data] = 0;
      totalPerDite[s.data] += (s.total||0);
    });
    const maxVal = Math.max.apply(null, Object.values(totalPerDite).concat([1]));

    // Build 12 months grid
    let hmHtml = '<div style="margin-bottom:16px">';
    const muajEmri = ['Jan','Shk','Mar','Pri','Maj','Qer','Kor','Gus','Sht','Tet','Nen','Dhj'];

    for (let m = 11; m >= 0; m--) {
      const d = new Date(sot.getFullYear(), sot.getMonth() - m, 1);
      const viti = d.getFullYear();
      const muaj = d.getMonth();
      const ditetNeMuaj = new Date(viti, muaj + 1, 0).getDate();
      const muajStr = viti + '-' + String(muaj+1).padStart(2,'0');
      const totalMuaj = Object.entries(totalPerDite)
        .filter(function(e) { return e[0].startsWith(muajStr); })
        .reduce(function(a,e) { return a+e[1]; }, 0);

      hmHtml += '<div style="margin-bottom:10px">';
      hmHtml += '<div style="font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between">'
        + '<span>' + muajEmri[muaj] + ' ' + viti + '</span>'
        + '<span style="color:var(--accent)">' + fm(totalMuaj) + '</span></div>';
      hmHtml += '<div style="display:flex;gap:3px;flex-wrap:wrap">';

      for (let day = 1; day <= ditetNeMuaj; day++) {
        const dateStr = viti + '-' + String(muaj+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
        const val = totalPerDite[dateStr] || 0;
        const pct = val / maxVal;
        let bg, title;
        if (val === 0) {
          bg = 'var(--bg3)';
        } else if (pct < 0.25) {
          bg = 'rgba(240,180,41,0.25)';
        } else if (pct < 0.5) {
          bg = 'rgba(240,180,41,0.5)';
        } else if (pct < 0.75) {
          bg = 'rgba(240,180,41,0.75)';
        } else {
          bg = 'var(--accent)';
        }
        title = dateStr + (val > 0 ? ': ' + fm(val) : ': Pa shitje');
        hmHtml += '<div title="' + title + '" style="width:14px;height:14px;border-radius:3px;background:' + bg + ';cursor:default;flex-shrink:0"></div>';
      }
      hmHtml += '</div></div>';
    }

    // Legend
    hmHtml += '<div style="display:flex;align-items:center;gap:6px;margin-top:12px;font-size:11px;color:var(--text2)">'
      + '<span>Pa shitje</span>'
      + '<div style="width:14px;height:14px;border-radius:3px;background:var(--bg3)"></div>'
      + '<div style="width:14px;height:14px;border-radius:3px;background:rgba(240,180,41,0.25)"></div>'
      + '<div style="width:14px;height:14px;border-radius:3px;background:rgba(240,180,41,0.5)"></div>'
      + '<div style="width:14px;height:14px;border-radius:3px;background:rgba(240,180,41,0.75)"></div>'
      + '<div style="width:14px;height:14px;border-radius:3px;background:var(--accent)"></div>'
      + '<span>Shume</span></div>';
    hmHtml += '</div>';
    tabContent = hmHtml;
  } else if (raporteTab === 'fitimi') {
    if (!stock.length) {
      tabContent = '<div class="empty-state">Nuk ka stock te regjistruar. Shko te Stock dhe shto produktet me cmimin e blerjes per te pare fitimet.</div>';
    } else {
      // Fitimi i muajit aktual
      const sot = new Date();
      const muajStr = sot.getFullYear() + '-' + String(sot.getMonth()+1).padStart(2,'0');
      const shitjetMuaj = shitjet.filter(function(s) { return (s.data||'').startsWith(muajStr); });
      const fitMuaj = llogaritFitimin(shitjetMuaj);

      // Fitimi i vitit
      const vitStr = String(sot.getFullYear());
      const shitjetVit = shitjet.filter(function(s) { return (s.data||'').startsWith(vitStr); });
      const fitVit = llogaritFitimin(shitjetVit);

      // Fitimi total
      const fitTotal = llogaritFitimin(shitjet);

      // Fitimi per produkt (ky muaj)
      const stockMap = {};
      stock.forEach(function(p) { stockMap[(p.emri||'').toLowerCase().trim()] = p; });
      const byProdFit = {};
      shitjetMuaj.forEach(function(s) {
        const key = (s.produkti||'').toLowerCase().trim();
        const sp = stockMap[key];
        if (!sp) return;
        if (!byProdFit[key]) byProdFit[key] = { emri: s.produkti, shitje: 0, kosto: 0, fitim: 0, count: 0 };
        byProdFit[key].shitje += s.total||0;
        byProdFit[key].kosto += (sp.cmimiBlerjes||0) * (s.sasia||1);
        byProdFit[key].fitim += (s.total||0) - (sp.cmimiBlerjes||0) * (s.sasia||1);
        byProdFit[key].count++;
      });

      const prodFitSort = Object.values(byProdFit).sort(function(a,b) { return b.fitim - a.fitim; });
      let prodRows = '';
      prodFitSort.forEach(function(p) {
        const marzhi = p.shitje > 0 ? (p.fitim / p.shitje * 100).toFixed(0) : 0;
        const col = marzhi >= 40 ? 'var(--success)' : marzhi >= 20 ? 'var(--accent)' : 'var(--error)';
        prodRows += '<div class="top-row"><div class="top-info"><strong>' + p.emri + '</strong>'
          + '<span>' + p.count + ' shitje &bull; Kosto: ' + fm(p.kosto) + ' &bull; <span style="color:' + col + '">Marzhi: ' + marzhi + '%</span></span></div>'
          + '<div class="top-total" style="color:var(--success)">+' + fm(p.fitim) + '</div></div>';
      });

      tabContent = '<div class="stats-grid" style="margin-bottom:16px">'
        + '<div class="stat-card gold"><div class="stat-icon">&#128200;</div><div class="stat-info"><span class="stat-val">' + fm(fitMuaj.totalFitim) + '</span><span class="stat-label">Fitim Ky Muaj</span></div></div>'
        + '<div class="stat-card"><div class="stat-icon">&#128201;</div><div class="stat-info"><span class="stat-val">' + fitMuaj.marzhi + '%</span><span class="stat-label">Marzhi Muaj</span></div></div>'
        + '<div class="stat-card"><div class="stat-icon">&#127942;</div><div class="stat-info"><span class="stat-val">' + fm(fitVit.totalFitim) + '</span><span class="stat-label">Fitim Ky Vit</span></div></div>'
        + '</div>'

async function ngarkoShpenzimeRap() {
  const el = document.getElementById('shpenzime-rap-wrap');
  if (!el) return;
  try {
    const snap = await getDocs(query(collection(db, 'shpenzime'), orderBy('krijuar','desc')));
    const te_gjitha = snap.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); });
    if (!te_gjitha.length) { el.innerHTML = '<div class="empty-state">Nuk ka shpenzime.</div>'; return; }

    // Group by month
    const byMuaj = {};
    te_gjitha.forEach(function(s) {
      const muaj = (s.data||'').substring(0,7);
      if (!byMuaj[muaj]) byMuaj[muaj] = {total:0, items:[]};
      byMuaj[muaj].total += (s.shuma||0);
      byMuaj[muaj].items.push(s);
    });

    const totalGjith = te_gjitha.reduce(function(a,s) { return a+(s.shuma||0); }, 0);
    let h = '<div style="background:var(--bg3);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between">'
      + '<span style="color:var(--text2)">Total shpenzime:</span>'
      + '<strong style="color:var(--error)">-' + fm(totalGjith) + '</strong></div>';

    Object.entries(byMuaj).sort(function(a,b) { return b[0].localeCompare(a[0]); }).forEach(function(entry) {
      const muaj = entry[0], data = entry[1];
      h += '<div style="margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">'
        + '<div style="display:flex;justify-content:space-between;margin-bottom:8px">'
        + '<strong style="font-size:13px">' + muaj + '</strong>'
        + '<span style="color:var(--error);font-weight:600">-' + fm(data.total) + '</span></div>';
      data.items.forEach(function(s) {
        const ora = s.krijuar && s.krijuar.seconds
          ? new Date(s.krijuar.seconds*1000).toLocaleDateString('sq',{day:'numeric',month:'short'}) : (s.data||'');
        // Ruaj foton ne fotoMap per ta hapur me id
        if (s.id && s.fotoUrl) fotoMap[s.id] = s.fotoUrl;
        h += '<div class="top-row" style="padding:6px 0">'
          + '<div class="top-info"><strong>' + (s.pershkrimi||'Shpenzim') + '</strong>'
          + '<span>' + ora + ' &bull; <span class="punetor-tag">' + (s.punetori||'-') + '</span>'
          + (s.fotoUrl ? ' &bull; <button data-sid="' + s.id + '" onclick="shfaqFotoById(this.dataset.sid)" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:0;font-family:DM Sans,sans-serif">&#128247; foto</button>' : '')
          + '</span></div>'
          + '<div style="text-align:right"><div style="font-weight:700;color:var(--error)">-' + fm(s.shuma||0) + '</div>'
          + '<button data-sid="' + s.id + '" onclick="fshiShpenzimin(this.dataset.sid)" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:11px;opacity:0.7">fshij</button>'
          + '</div></div>';
      });
      h += '</div>';
    });

    el.innerHTML = h;
  } catch(e) {
    el.innerHTML = '<div class="empty-state">Gabim: ' + e.message + '</div>';
  }
}

window.eksportKontabilitetit = async function() {
  const muaji = document.getElementById('kont-muaji')?.value;
  if (!muaji) return err('Zgjidh muajin!');
  const muajStart = muaji + '-01';
  const muajEnd = muaji + '-31';
  ok('Duke përgatitur raportin...');
  try {
    // 1. Shitjet e muajit
    const shitjetMuaj = shitjet.filter(function(s) {
      return s.data >= muajStart && s.data <= muajEnd && s.punetoriUid !== 'admin_posta';
    }).sort(function(a,b) { return (a.data||'').localeCompare(b.data||''); });

    // 2. Shpenzime ditore
    const snap1 = await getDocs(query(collection(db, 'shpenzime'), orderBy('krijuar','desc')));
    const shpDitore = snap1.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); })
      .filter(function(s) { return (s.data||'') >= muajStart && (s.data||'') <= muajEnd; });

    // 3. Shpenzime fikse
    const snap2 = await getDocs(query(collection(db, 'shpenzime_fikse'), orderBy('krijuar','desc')));
    const shpFikse = snap2.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); })
      .filter(function(s) { return (s.muaji||'').startsWith(muaji); });

    // 4. Paga
    const snap3 = await getDocs(query(collection(db, 'paga'), orderBy('krijuar','desc')));
    const paga = snap3.docs.map(function(d) { return Object.assign({id:d.id}, d.data()); })
      .filter(function(s) { return (s.muaji||'').startsWith(muaji); });

    // Totalet
    const totalShitje = shitjetMuaj.reduce(function(a,s) { return a+(s.total||0); }, 0);
    const totalShpDitore = shpDitore.reduce(function(a,s) { return a+(s.shuma||0); }, 0);
    const totalShpFikse = shpFikse.reduce(function(a,s) { return a+(s.shuma||0); }, 0);
    const totalPaga = paga.reduce(function(a,s) { return a+(s.shuma||0); }, 0);
    const totalShpenzime = totalShpDitore + totalShpFikse + totalPaga;
    const fitimBruto = totalShitje - totalShpenzime;

    // Build CSV me seksione
    let rows = [];

    // Header
    rows.push(['RAPORT KONTABILITETI - DOHA Accessories']);
    rows.push(['Muaji: ' + muaji]);
    rows.push(['Gjeneruar: ' + new Date().toLocaleDateString('sq')]);
    rows.push([]);

    // Permbledhje
    rows.push(['=== PERMBLEDHJE ===']);
    rows.push(['Totali Shitjeve', '', '', '', '', totalShitje.toFixed(2)]);
    rows.push(['Shpenzime Ditore', '', '', '', '', '-' + totalShpDitore.toFixed(2)]);
    rows.push(['Shpenzime Fikse', '', '', '', '', '-' + totalShpFikse.toFixed(2)]);
    rows.push(['Paga Punetoreve', '', '', '', '', '-' + totalPaga.toFixed(2)]);
    rows.push(['FITIMI BRUTO', '', '', '', '', fitimBruto.toFixed(2)]);
    rows.push([]);

    // Shitjet
    rows.push(['=== SHITJET ===']);
    rows.push(['Data','Produkti','Sasia','Cmimi','Total','Punetori','Klienti','Shenimi']);
    shitjetMuaj.forEach(function(s) {
      rows.push([s.data||'', s.produkti||'', s.sasia||1, (s.cmimi||0).toFixed(2),
        (s.total||0).toFixed(2), s.punetori||'', s.klienti||'', s.shen||'']);
    });
    rows.push(['','','','TOTAL', totalShitje.toFixed(2),'','','']);
    rows.push([]);

    // Shpenzime ditore
    rows.push(['=== SHPENZIME DITORE ===']);
    rows.push(['Data','Pershkrimi','Punetori','Shuma']);
    shpDitore.forEach(function(s) {
      rows.push([s.data||'', s.pershkrimi||'', s.punetori||'', (s.shuma||0).toFixed(2)]);
    });
    rows.push(['','TOTAL','', totalShpDitore.toFixed(2)]);
    rows.push([]);

    // Shpenzime fikse
    rows.push(['=== SHPENZIME FIKSE ===']);
    rows.push(['Kategoria','Pershkrimi','Shuma']);
    shpFikse.forEach(function(s) {
      rows.push([s.kategoria||'', s.pershkrimi||'', (s.shuma||0).toFixed(2)]);
    });
    rows.push(['TOTAL','', totalShpFikse.toFixed(2)]);
    rows.push([]);

    // Paga
    rows.push(['=== PAGA ===']);
    rows.push(['Punetori','Shuma','Shenimi']);
    paga.forEach(function(s) {
      rows.push([s.punetori||'', (s.shuma||0).toFixed(2), s.shen||'']);
    });
    rows.push(['TOTAL', totalPaga.toFixed(2), '']);

    const csv = rows.map(function(r) {
      return r.map(function(c) { return '"' + String(c||'').replace(/"/g,'""') + '"'; }).join(',');
    }).join('\r\n');

    const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'DOHA_Kontabiliteti_' + muaji + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    ok('Raporti u shkarkua! ' + shitjetMuaj.length + ' shitje, ' + shpDitore.length + ' shpenzime, ' + paga.length + ' paga.');
  } catch(e) { err('Gabim: ' + e.message); }
};

window.shkarkoCSV = function() {
  const hdrs = ['Data','Produkti','Sasia','Njesia','Cmimi','Total','Klienti','Punetori','Shenimi'];
  const rows = shitjet.slice().sort(function(a,b) { return (b.data||'').localeCompare(a.data||''); }).map(function(s) {
    return [s.data||'', s.produkti||'', s.sasia||'', s.njesia||'cop',
      (s.cmimi||0).toFixed(2), (s.total||0).toFixed(2),
      s.klienti||'', s.punetori||'', s.shen||''];
  });
  const tot = shitjet.reduce(function(a,s) { return a+(s.total||0); }, 0);
  rows.push(['','','','','TOTAL',(tot).toFixed(2),'','','']);
  const csv = [hdrs].concat(rows).map(function(r) {
    return r.map(function(c) { return '"' + String(c).replace(/"/g,'""') + '"'; }).join(',');
  }).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'DOHA_Shitjet_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  ok('CSV u shkarkua!');
};

window.konfirmoFshijBitrix = function() {
  const bitrixCount = shitjet.filter(function(s) { return s.punetoriUid === 'bitrix_import'; }).length;
  if (!bitrixCount) return err('Nuk ka shitje Bitrix per te fshire!');
